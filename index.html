/* ============================================================
   PERSONAL MEETINGS VIEW — список сотрудников и их встречи
   ============================================================ */
function PersonalView({ personalMeetings, tasks, selectedEmployee, setSelectedEmployee, onSelectMeeting, onUpdateTask, onDeleteTask, team = [], showToast }) {
  const byEmployee = useMemo(() => {
    const map = {};
    for (const m of personalMeetings) {
      const e = m.employee || "Без указания";
      if (!map[e]) map[e] = [];
      map[e].push(m);
    }
    // sort each list by date desc
    for (const e of Object.keys(map)) map[e].sort((a, b) => b.date - a.date);
    return map;
  }, [personalMeetings]);

  const employees = useMemo(() => Object.keys(byEmployee).sort((a, b) => {
    const oa = team.find(m => m.fullName === a)?.sortOrder ?? 99;
    const ob = team.find(m => m.fullName === b)?.sortOrder ?? 99;
    return oa - ob;
  }), [byEmployee, team]);

  const employeeTasks = useMemo(() => {
    if (!selectedEmployee) return [];
    const meetingIds = new Set((byEmployee[selectedEmployee] || []).map(m => m.id));
    return tasks.filter(t => meetingIds.has(t.meetingId) || t.employee === selectedEmployee);
  }, [selectedEmployee, byEmployee, tasks]);

  // Detail view for one employee
  if (selectedEmployee) {
    const meetings = byEmployee[selectedEmployee] || [];
    const initials = selectedEmployee.split(/\s+/).map(p => p[0]).slice(0, 2).join("").toUpperCase();
    const openTasks = employeeTasks.filter(t => t.assignees.some(a => a.status !== "done") || t.assignees.length === 0);
    return (
      <div>
        <button className="btn btn-ghost btn-sm" onClick={() => setSelectedEmployee(null)} style={{ marginBottom: 16 }}>
          <ArrowLeft size={14}/> Ко всем сотрудникам
        </button>

        <div className="card" style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 16 }}>
          <div className="avatar" style={{ width: 56, height: 56, borderRadius: '50%', background: 'var(--accent-tint)', color: 'var(--accent-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Fraunces, serif', fontSize: 22, fontWeight: 600 }}>
            {initials || "?"}
          </div>
          <div style={{ flex: 1 }}>
            <div className="display" style={{ fontSize: 26 }}>{selectedEmployee}</div>
            <div className="small" style={{ marginTop: 4 }}>
              {meetings.length} {meetings.length === 1 ? 'встреча' : meetings.length > 1 && meetings.length < 5 ? 'встречи' : 'встреч'} · {openTasks.length} открытых задач
            </div>
          </div>
        </div>

        <div className="card">
          <div className="display" style={{ fontSize: 18, marginBottom: 12 }}>История встреч</div>
          {meetings.length === 0 ? (
            <div className="small">Встреч пока не было</div>
          ) : (
            meetings.map(m => {
              const d = new Date(m.date);
              return (
                <div key={m.id} className="meeting-row" onClick={() => onSelectMeeting(m)} style={{ marginBottom: 8 }}>
                  <div className="date-block">
                    <div className="day">{d.getDate()}</div>
                    <div className="mon">{RU_MONTHS[d.getMonth()].slice(0, 3)}</div>
                  </div>
                  <div className="info">
                    <h3>{m.title}</h3>
                    <div className="meta">{formatDate(m.date)}</div>
                  </div>
                  <ChevronRight size={20} style={{ color: 'var(--ink-3)' }} />
                </div>
              );
            })
          )}
        </div>

        {employeeTasks.length > 0 && (
          <div className="card">
            <div className="display" style={{ fontSize: 18, marginBottom: 12 }}>Задачи по сотруднику ({employeeTasks.length})</div>
            {employeeTasks.map(t => (
              <TaskCard
                key={t.id}
                task={t}
                team={team}
                showToast={showToast}
                onUpdate={onUpdateTask}
                onDelete={() => onDeleteTask(t.id)}
                showStatusBadge
                computeStatus={(task) => {
                  if (task.assignees.length === 0) return "pending";
                  const done = task.assignees.filter(a => a.status === "done").length;
                  if (done === 0) return "pending";
                  if (done === task.assignees.length) return "done";
                  return "partial";
                }}
              />
            ))}
          </div>
        )}
      </div>
    );
  }

  // List of all employees
  if (employees.length === 0) {
    return (
      <div className="empty">
        <div className="display">Личных встреч пока нет</div>
        <div>На вкладке «Новое собрание» выберите «Личная встреча (1-на-1)» и загрузите транскрипцию</div>
      </div>
    );
  }

  return (
    <div>
      <div className="card" style={{ marginBottom: 16, background: 'var(--surface-2)', borderStyle: 'dashed' }}>
        <div className="small" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <Users size={14} style={{ color: 'var(--accent)' }}/>
          <span>Здесь хранятся ваши приватные заметки 1-на-1 со {employees.length} {employees.length === 1 ? 'сотрудником' : 'сотрудниками'}. Кликните на карточку, чтобы увидеть все встречи и задачи.</span>
        </div>
      </div>
      <div className="employee-grid">
        {employees.map(name => {
          const list = byEmployee[name];
          const lastDate = list[0]?.date;
          const taskCount = tasks.filter(t => list.some(m => m.id === t.meetingId)).length;
          const initials = name.split(/\s+/).map(p => p[0]).slice(0, 2).join("").toUpperCase();
          return (
            <button key={name} className="employee-card" onClick={() => setSelectedEmployee(name)}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div className="avatar">{initials || "?"}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div className="ename" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{name}</div>
                  <div className="estat">{list.length} встреч · {taskCount} задач</div>
                </div>
              </div>
              <div className="small" style={{ marginTop: 4 }}>
                Последняя: {lastDate ? formatDate(lastDate) : '—'}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function TasksView({ tasks, meetings, onUpdate, onDelete, onAdd, onSelectMeeting, showToast, team = [], tgConfig }) {
  const [filter, setFilter] = useState("all"); // status: all | pending | partial | done
  const [dueFilter, setDueFilter] = useState(null); // deadline: overdue | today | week | no-date | null
  const [assigneeFilter, setAssigneeFilter] = useState(null);
  const [search, setSearch] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [hideCompleted, setHideCompleted] = useState(false);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [mergingTaskId, setMergingTaskId] = useState(null);
  const [mergeSearch, setMergeSearch] = useState("");

  // Сбрасываем выделение при смене фильтра
  useEffect(() => { setSelectedIds(new Set()); }, [assigneeFilter, filter, dueFilter, search]);

  const toggleSelect = (id) => {
    setSelectedIds(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  const toggleSelectAll = (filteredTasks) => {
    const allSelected = filteredTasks.every(t => selectedIds.has(t.id));
    if (allSelected) {
      setSelectedIds(new Set());
    } else {
      setSelectedIds(new Set(filteredTasks.map(t => t.id)));
    }
  };

  const copySelected = () => {
    const selected = tasks.filter(t => selectedIds.has(t.id));
    if (!selected.length) { showToast("Ничего не выбрано"); return; }
    const text = selected.map(t => formatTaskForShare(t)).join("\n\n———\n\n");
    copyToClipboard(text, showToast);
  };

  // Форматирование одной задачи для Telegram с @упоминаниями тех кто НЕ сделал
  const formatTaskForTg = (task) => {
    const lines = [`📌 ${task.title}`];
    if (task.description) lines.push(task.description);
    if (task.dueDate) {
      const d = new Date(task.dueDate);
      lines.push(`📅 до ${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`);
    }
    // Только незавершённые исполнители + их @username из справочника
    const openAssignees = (task.assignees || []).filter(a => a.status !== "done");
    if (openAssignees.length) {
      const mentions = openAssignees.map(a => {
        const member = team.find(m => m.fullName === a.name);
        const tg = member?.telegram || "";
        if (tg) return tg.startsWith("@") ? tg : "@" + tg;
        return a.name; // если нет @username — пишем имя
      });
      lines.push(`👤 ${mentions.join(" ")}`);
    }
    for (const l of getTaskLinks(task)) lines.push(`🔗 ${l}`);
    return lines.join("\n");
  };

  const [sendingToTg, setSendingToTg] = useState(false);

  const sendSelectedToTg = async () => {
    const selected = tasks.filter(t => selectedIds.has(t.id));
    if (!selected.length) { showToast("Ничего не выбрано"); return; }
    if (!tgConfig?.chats?.length) { showToast("Сначала настройте Telegram (кнопка в шапке)"); return; }
    if (!tgConfig?.botToken && !tgConfig?.webhookUrl) { showToast("Нет токена бота и webhook"); return; }

    const chat = tgConfig.chats[0]; // первый чат — МОП АРТЕМ
    const header = `📋 Напоминание по задачам (${selected.length})\n`;
    const body = selected.map(t => formatTaskForTg(t)).join("\n\n———\n\n");
    const fullText = header + "\n" + body;

    setSendingToTg(true);
    try {
      if (tgConfig.botToken) {
        // Bot API — режем длинный текст на части
        const parts = splitForTelegram(fullText);
        for (const part of parts) {
          const res = await fetch(`https://api.telegram.org/bot${tgConfig.botToken}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: chat.chatId, text: part, disable_web_page_preview: true })
          });
          const data = await res.json();
          if (!data.ok) throw new Error(data.description || "Ошибка Bot API");
        }
      } else if (tgConfig.webhookUrl) {
        const res = await fetch(tgConfig.webhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ chat_id: chat.chatId, chatId: chat.chatId, text: fullText, chat_name: chat.name })
        });
        if (!res.ok) throw new Error("Webhook вернул " + res.status);
      }
      showToast(`✓ Отправлено ${selected.length} задач(и) в «${chat.name}»`);
      setSelectedIds(new Set());
    } catch (e) {
      showToast("Ошибка: " + e.message);
    } finally {
      setSendingToTg(false);
    }
  };

  const duplicateTask = (task) => {
    const copy = {
      ...task,
      id: uid(),
      title: task.title + " (копия)",
      assignees: task.assignees.map(a => ({ ...a, status: "pending" })),
      createdAt: Date.now()
    };
    onAdd(copy);
    showToast(`✓ Задача дублирована — «${copy.title}»`);
  };

  const mergeTasks = (sourceId, targetId) => {
    const source = tasks.find(t => t.id === sourceId);
    const target = tasks.find(t => t.id === targetId);
    if (!source || !target) return;

    // Объединяем данные: target поглощает source
    const merged = { ...target };

    // Описание: дополняем
    if (source.description) {
      merged.description = (merged.description || "") +
        (merged.description ? "\n\n— объединено —\n" : "") + source.description;
    }

    // Исполнители: добавляем тех кого нет
    const existingNames = new Set(merged.assignees.map(a => a.name.toLowerCase()));
    for (const a of (source.assignees || [])) {
      if (!existingNames.has(a.name.toLowerCase())) {
        merged.assignees = [...merged.assignees, a];
      }
    }

    // Срок: берём ближайший непустой
    if (!merged.dueDate && source.dueDate) merged.dueDate = source.dueDate;

    // Ссылка: берём если нет
    const targetLinks = getTaskLinks(merged);
    const sourceLinks = getTaskLinks(source);
    const allLinks = [...targetLinks];
    for (const l of sourceLinks) if (!allLinks.includes(l)) allLinks.push(l);
    merged.links = allLinks;
    merged.link = null;

    onUpdate(merged);
    onDelete(sourceId);
    setMergingTaskId(null);
    setMergeSearch("");
    showToast(`✓ Задачи объединены → «${target.title}»`);
  };

  const allAssignees = useMemo(() => {
    const set = new Set();
    tasks.forEach(t => t.assignees.forEach(a => set.add(a.name)));
    return [...set].sort((a, b) => {
      const orderA = team.find(m => m.fullName === a)?.sortOrder ?? 99;
      const orderB = team.find(m => m.fullName === b)?.sortOrder ?? 99;
      return orderA - orderB;
    });
  }, [tasks, team]);

  const computeStatus = (t) => {
    if (t.assignees.length === 0) return "pending";
    const done = t.assignees.filter(a => a.status === "done").length;
    if (done === 0) return "pending";
    if (done === t.assignees.length) return "done";
    return "partial";
  };

  // Considers a task "open" if it's not fully done
  const isOpen = (t) => computeStatus(t) !== "done";

  // Digest counts (only open tasks count in deadline categories)
  const counts = useMemo(() => {
    const c = { overdue: 0, today: 0, week: 0, "no-date": 0, future: 0 };
    for (const t of tasks) {
      if (!isOpen(t)) continue;
      c[getDueCategory(t.dueDate)]++;
    }
    return c;
  }, [tasks]);

  const filtered = tasks.filter(t => {
    // Status filter — when an assignee is selected, use THEIR personal status
    if (filter !== "all") {
      if (assigneeFilter) {
        const a = t.assignees.find(x => x.name === assigneeFilter);
        if (!a) return false;
        const personalStatus = a.status || "pending";
        if (filter === "pending" && personalStatus !== "pending") return false;
        if (filter === "in-progress" && personalStatus !== "in-progress") return false;
        if (filter === "done" && personalStatus !== "done") return false;
        if (filter === "partial") return false; // partial не релевантно для одного исполнителя
      } else {
        // Task-level aggregate status
        if (filter === "in-progress") {
          if (!t.assignees.some(a => a.status === "in-progress")) return false;
        } else if (computeStatus(t) !== filter) {
          return false;
        }
      }
    }
    if (hideCompleted && computeStatus(t) === "done") return false;
    if (dueFilter) {
      if (!isOpen(t)) return false; // due filters only show open tasks
      if (getDueCategory(t.dueDate) !== dueFilter) return false;
    }
    if (assigneeFilter && !t.assignees.find(a => a.name === assigneeFilter)) return false;
    if (search && !(t.title.toLowerCase().includes(search.toLowerCase()) || t.description.toLowerCase().includes(search.toLowerCase()))) return false;
    return true;
  });

  // sort: overdue first, then by due date, then no-date last
  const sorted = [...filtered].sort((a, b) => {
    const ad = a.dueDate, bd = b.dueDate;
    if (ad && bd) return ad - bd;
    if (ad && !bd) return -1;
    if (!ad && bd) return 1;
    return (b.createdAt || 0) - (a.createdAt || 0);
  });

  const copyReminder = async () => {
    const openTasks = tasks.filter(isOpen);
    const text = generateReminderText(openTasks);
    try {
      await navigator.clipboard.writeText(text);
      showToast?.("Текст напоминания скопирован");
    } catch {
      showToast?.("Не удалось скопировать");
    }
  };

  const exportCalendar = () => {
    const withDates = tasks.filter(t => t.dueDate && isOpen(t));
    if (withDates.length === 0) {
      showToast?.("Нет задач с дедлайнами для экспорта");
      return;
    }
    downloadICS(withDates, `задачи-${formatDateShort(Date.now())}.ics`);
    showToast?.(`Скачано: ${withDates.length} задач`);
  };

  return (
    <div>
      {/* Digest banner */}
      <div className="digest">
        <button
          className={`digest-card overdue ${dueFilter === 'overdue' ? 'active' : ''}`}
          onClick={() => setDueFilter(dueFilter === 'overdue' ? null : 'overdue')}
        >
          <span className="label"><AlertCircle size={12}/> Просрочено</span>
          <span className="count">{counts.overdue}</span>
        </button>
        <button
          className={`digest-card today ${dueFilter === 'today' ? 'active' : ''}`}
          onClick={() => setDueFilter(dueFilter === 'today' ? null : 'today')}
        >
          <span className="label"><AlarmClock size={12}/> Сегодня</span>
          <span className="count">{counts.today}</span>
        </button>
        <button
          className={`digest-card week ${dueFilter === 'week' ? 'active' : ''}`}
          onClick={() => setDueFilter(dueFilter === 'week' ? null : 'week')}
        >
          <span className="label"><CalendarClock size={12}/> На 7 дней</span>
          <span className="count">{counts.week}</span>
        </button>
        <button
          className={`digest-card ${dueFilter === 'no-date' ? 'active' : ''}`}
          onClick={() => setDueFilter(dueFilter === 'no-date' ? null : 'no-date')}
        >
          <span className="label"><Calendar size={12}/> Без срока</span>
          <span className="count">{counts["no-date"]}</span>
        </button>
      </div>

      {/* Reminder toolbar */}
      <div className="reminder-toolbar">
        <Bell size={16} style={{ color: 'var(--accent)' }}/>
        <span className="small" style={{ flex: 1 }}>Напоминания:</span>
        <button className="btn btn-sm" onClick={copyReminder}>
          <Copy size={13}/> Скопировать текст
        </button>
        <button className="btn btn-sm" onClick={exportCalendar}>
          <Download size={13}/> Экспорт в календарь
        </button>
      </div>

      <div style={{ display: 'flex', gap: 12, marginBottom: 16, flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 200, position: 'relative' }}>
          <Search size={16} style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--ink-3)' }} />
          <input placeholder="Поиск по задачам" value={search} onChange={e => setSearch(e.target.value)} style={{ paddingLeft: 36 }} />
        </div>
        <button className="btn btn-primary" onClick={() => setShowAdd(true)}><Plus size={14}/> Новая задача</button>
      </div>

      <div className="filter-bar">
        <button className={`filter-btn ${filter==='all'?'active':''}`} onClick={() => setFilter('all')}>Все · {tasks.length}</button>
        <button className={`filter-btn ${filter==='pending'?'active':''}`} onClick={() => setFilter('pending')}>
          <Square size={11} style={{ verticalAlign: 'middle', marginRight: 3 }}/>
          Не сделано
        </button>
        <button className={`filter-btn ${filter==='in-progress'?'active':''}`} onClick={() => setFilter('in-progress')}>
          <Clock size={11} style={{ verticalAlign: 'middle', marginRight: 3 }}/>
          В работе
        </button>
        {!assigneeFilter && (
          <button className={`filter-btn ${filter==='partial'?'active':''}`} onClick={() => setFilter('partial')}>Частично</button>
        )}
        <button className={`filter-btn ${filter==='done'?'active':''}`} onClick={() => setFilter('done')}>
          <Check size={11} style={{ verticalAlign: 'middle', marginRight: 3 }}/>
          Готово
        </button>
        <button className={`filter-btn ${hideCompleted?'active':''}`} onClick={() => setHideCompleted(h => !h)} title="Скрыть выполненные">
          {hideCompleted ? '☑' : '☐'} Скрыть готовые
        </button>
      </div>

      {allAssignees.length > 0 && (
        <div className="filter-bar">
          <span className="small" style={{ alignSelf: 'center', marginRight: 4 }}>Исполнитель:</span>
          <button className={`filter-btn ${!assigneeFilter?'active':''}`} onClick={() => setAssigneeFilter(null)}>Все</button>
          {allAssignees.map(name => (
            <button key={name} className={`filter-btn ${assigneeFilter===name?'active':''}`} onClick={() => setAssigneeFilter(name)}>{name}</button>
          ))}
          {sorted.length > 0 && (
            <div style={{ marginLeft: 'auto', display: 'flex', gap: 6, alignItems: 'center' }}>
              <button
                className="btn btn-ghost btn-sm"
                onClick={() => toggleSelectAll(sorted)}
                title={sorted.every(t => selectedIds.has(t.id)) ? "Снять все" : "Выбрать все"}
              >
                {sorted.length > 0 && sorted.every(t => selectedIds.has(t.id))
                  ? <><CheckSquare size={12}/> Снять все</>
                  : <><Square size={12}/> Выбрать все</>
                }
              </button>
              {selectedIds.size > 0 && (
                <>
                  <button className="btn btn-sm" onClick={copySelected} title="Скопировать в буфер">
                    <Copy size={12}/> Скопировать ({selectedIds.size})
                  </button>
                  {!_artifactStorage && tgConfig?.chats?.length > 0 && (tgConfig?.botToken || tgConfig?.webhookUrl) && (
                    <button className="btn btn-sm btn-tg" onClick={sendSelectedToTg} disabled={sendingToTg} title={`Отправить ботом в «${tgConfig.chats[0].name}» с @упоминаниями`}>
                      {sendingToTg ? <Loader2 size={12} className="spin"/> : <Send size={12}/>}
                      Отправить в «{tgConfig.chats[0].name}» ({selectedIds.size})
                    </button>
                  )}
                </>
              )}
            </div>
          )}
        </div>
      )}

      {(dueFilter || filter !== "all" || assigneeFilter || search || hideCompleted) && (
        <div className="active-filter-bar">
          <Filter size={14} style={{ color: 'var(--accent)' }}/>
          <span className="small" style={{ flex: 1 }}>
            <strong>Показано {sorted.length}</strong> из {tasks.length} задач
            {dueFilter && <span className="active-tag" style={{ marginLeft: 8 }}>
              {dueFilter === 'overdue' ? '⚠️ Просрочено' :
               dueFilter === 'today' ? '📌 Сегодня' :
               dueFilter === 'week' ? '🔜 На 7 дней' :
               '📅 Без срока'}
              <X size={12} style={{ marginLeft: 4, cursor: 'pointer' }} onClick={() => setDueFilter(null)}/>
            </span>}
            {filter !== "all" && <span className="active-tag" style={{ marginLeft: 8 }}>
              Статус: {filter === 'pending' ? 'Не сделано' :
                       filter === 'in-progress' ? 'В работе' :
                       filter === 'partial' ? 'Частично' : 'Готово'}
              <X size={12} style={{ marginLeft: 4, cursor: 'pointer' }} onClick={() => setFilter('all')}/>
            </span>}
            {assigneeFilter && <span className="active-tag" style={{ marginLeft: 8 }}>
              Исполнитель: {assigneeFilter}
              <X size={12} style={{ marginLeft: 4, cursor: 'pointer' }} onClick={() => setAssigneeFilter(null)}/>
            </span>}
            {search && <span className="active-tag" style={{ marginLeft: 8 }}>
              Поиск: «{search}»
              <X size={12} style={{ marginLeft: 4, cursor: 'pointer' }} onClick={() => setSearch("")}/>
            </span>}
          </span>
          <button className="btn btn-ghost btn-sm" onClick={() => {
            setDueFilter(null); setFilter("all"); setAssigneeFilter(null); setSearch(""); setHideCompleted(false);
          }}>
            Сбросить всё
          </button>
        </div>
      )}

      {sorted.length === 0 ? (
        <div className="empty">
          <div className="display">Нет задач</div>
          <div>{tasks.length === 0 ? "Сгенерируйте задачи из собрания или добавьте вручную" : "Попробуйте изменить фильтры"}</div>
        </div>
      ) : (
        sorted.map(t => {
          const m = meetings.find(mm => mm.id === t.meetingId);
          return (
            <div key={t.id} style={{ display: 'flex', gap: 0, alignItems: 'flex-start' }}>
              <div
                onClick={() => toggleSelect(t.id)}
                style={{
                  padding: '14px 10px 14px 2px', cursor: 'pointer',
                  display: 'flex', alignItems: 'flex-start', flexShrink: 0
                }}
              >
                {selectedIds.has(t.id)
                  ? <CheckSquare size={18} style={{ color: 'var(--accent)' }}/>
                  : <Square size={18} style={{ color: 'var(--ink-3)' }}/>
                }
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <TaskCard
                  task={t}
                  team={team}
                  showToast={showToast}
                  meetingLabel={m?.title}
                  onMeetingClick={m ? () => onSelectMeeting(m) : null}
                  onUpdate={onUpdate}
                  onDelete={() => onDelete(t.id)}
                  onMerge={() => { setMergingTaskId(t.id); setMergeSearch(""); }}
                  onDuplicate={() => duplicateTask(t)}
                  showStatusBadge
                  computeStatus={computeStatus}
                />
              </div>
            </div>
          );
        })
      )}

      {showAdd && <AddTaskModal team={team} onClose={() => setShowAdd(false)} onAdd={(t) => { onAdd(t); setShowAdd(false); }} />}

      {/* Модалка объединения задач */}
      {mergingTaskId && (() => {
        const source = tasks.find(t => t.id === mergingTaskId);
        if (!source) return null;
        const others = tasks.filter(t => {
          if (t.id === mergingTaskId) return false;
          if (t.assignees.length > 0 && t.assignees.every(a => a.status === "done")) return false;
          return true;
        });
        const q = mergeSearch.toLowerCase();
        const filtered = q
          ? others.filter(t => t.title.toLowerCase().includes(q) || (t.description || "").toLowerCase().includes(q) || t.assignees.some(a => a.name.toLowerCase().includes(q)))
          : others;
        return (
          <div className="modal-backdrop" onClick={() => setMergingTaskId(null)}>
            <div className="modal" style={{ maxWidth: 560 }} onClick={e => e.stopPropagation()}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                <div className="display" style={{ fontSize: 20 }}>🔗 Объединить задачу</div>
                <button className="btn btn-ghost btn-sm" onClick={() => setMergingTaskId(null)}><X size={16}/></button>
              </div>

              <div style={{ padding: 12, background: 'var(--accent-tint)', borderRadius: 8, marginBottom: 14, border: '1px solid var(--accent)' }}>
                <div className="small" style={{ fontWeight: 600, marginBottom: 4 }}>Эта задача будет удалена:</div>
                <div style={{ fontWeight: 600 }}>📌 {source.title}</div>
                {source.description && <div className="small" style={{ marginTop: 4 }}>{source.description.slice(0, 100)}{source.description.length > 100 ? '…' : ''}</div>}
              </div>

              <div className="small" style={{ marginBottom: 8 }}>Выберите задачу, в которую объединить (она сохранится с дополненными данными):</div>

              <input
                placeholder="Поиск по названию…"
                value={mergeSearch}
                onChange={e => setMergeSearch(e.target.value)}
                autoFocus
                style={{ marginBottom: 10 }}
              />

              <div style={{ maxHeight: 350, overflowY: 'auto' }}>
                {filtered.length === 0 ? (
                  <div className="small" style={{ padding: 12, textAlign: 'center' }}>Нет подходящих задач</div>
                ) : (
                  filtered.map(t => (
                    <div
                      key={t.id}
                      onClick={() => mergeTasks(source.id, t.id)}
                      style={{
                        padding: '10px 12px', marginBottom: 6, borderRadius: 8,
                        border: '1px solid var(--line)', cursor: 'pointer',
                        background: 'var(--surface)',
                        transition: 'background 0.12s'
                      }}
                      onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-tint)'}
                      onMouseLeave={e => e.currentTarget.style.background = 'var(--surface)'}
                    >
                      <div style={{ fontWeight: 600, fontSize: 14 }}>{t.title}</div>
                      {t.description && <div className="small" style={{ marginTop: 2 }}>{t.description.slice(0, 80)}{t.description.length > 80 ? '…' : ''}</div>}
                      <div className="small" style={{ marginTop: 4, display: 'flex', gap: 12 }}>
                        {t.assignees.length > 0 && <span>👤 {t.assignees.map(a => a.name).join(", ")}</span>}
                        {t.dueDate && <span>📅 {formatDateShort(t.dueDate)}</span>}
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ============================================================
   TASK CARD — full task with assignee status toggles
   ============================================================ */
function TaskCard({ task, onUpdate, onDelete, meetingLabel, onMeetingClick, showStatusBadge, computeStatus, team = [], showToast, onMerge, onDuplicate }) {
  const [newAssignee, setNewAssignee] = useState("");
  const [showAddAssignee, setShowAddAssignee] = useState(false);
  const [showDatePicker, setShowDatePicker] = useState(false);
  const [editingAssigneeIdx, setEditingAssigneeIdx] = useState(null);
  const [assigneeEditValue, setAssigneeEditValue] = useState("");
  const [editingLink, setEditingLink] = useState(false);
  const [linkValue, setLinkValue] = useState("");
  const [editingTitle, setEditingTitle] = useState(false);
  const [titleValue, setTitleValue] = useState("");
  const [editingDesc, setEditingDesc] = useState(false);
  const [descValue, setDescValue] = useState("");
  const [dateAssigneeIdx, setDateAssigneeIdx] = useState(null); // null = task-level, number = per-assignee

  const commitLink = () => {
    const v = linkValue.trim();
    const currentLinks = getTaskLinks(task);
    if (!v) { setEditingLink(false); return; }
    const norm = normalizeUrl(v);
    if (norm && !currentLinks.includes(norm)) {
      onUpdate({ ...task, links: [...currentLinks, norm], link: null });
    }
    setLinkValue("");
    setEditingLink(false);
  };
  const startEditLink = () => {
    setLinkValue("");
    setEditingLink(true);
  };
  const removeLinkAt = (idx) => {
    const currentLinks = getTaskLinks(task);
    onUpdate({ ...task, links: currentLinks.filter((_, i) => i !== idx), link: null });
  };

  const setStatus = (idx, next) => {
    onUpdate({ ...task, assignees: task.assignees.map((a, i) => i === idx ? { ...a, status: next } : a) });
  };
  const removeAssignee = (idx) => {
    onUpdate({ ...task, assignees: task.assignees.filter((_, i) => i !== idx) });
  };
  const renameAssignee = (idx) => {
    const newName = assigneeEditValue.trim();
    if (!newName) { setEditingAssigneeIdx(null); return; }
    // skip duplicates (except self)
    if (task.assignees.some((a, i) => i !== idx && a.name.toLowerCase() === newName.toLowerCase())) {
      setEditingAssigneeIdx(null);
      return;
    }
    onUpdate({ ...task, assignees: task.assignees.map((a, i) => i === idx ? { ...a, name: newName } : a) });
    setEditingAssigneeIdx(null);
  };
  const startRename = (idx) => {
    setAssigneeEditValue(task.assignees[idx].name);
    setEditingAssigneeIdx(idx);
  };
  const addAssignee = () => {
    const name = newAssignee.trim();
    if (!name) return;
    if (task.assignees.find(a => a.name.toLowerCase() === name.toLowerCase())) return;
    onUpdate({ ...task, assignees: [...task.assignees, { name, status: "pending", dueDate: task.dueDate || null }] });
    setNewAssignee("");
    setShowAddAssignee(false);
  };

  const changeDueDate = (newTs) => {
    if (dateAssigneeIdx !== null) {
      // Per-assignee date change
      const a = task.assignees[dateAssigneeIdx];
      if (!a) return;
      const oldDate = a.dueDate || task.dueDate;
      const isPostpone = oldDate && newTs && newTs > oldDate;
      const newAssignees = [...task.assignees];
      newAssignees[dateAssigneeIdx] = {
        ...a,
        dueDate: newTs,
        originalDueDate: a.originalDueDate || oldDate || newTs,
        postponedCount: isPostpone ? (a.postponedCount || 0) + 1 : (a.postponedCount || 0)
      };
      onUpdate({ ...task, assignees: newAssignees });
    } else {
      // Task-level: set for task AND all assignees without their own date
      const isPostpone = task.dueDate && newTs && newTs > task.dueDate;
      const newAssignees = task.assignees.map(a => ({
        ...a,
        dueDate: a.dueDate ? a.dueDate : newTs, // don't overwrite individual dates
      }));
      onUpdate({
        ...task,
        dueDate: newTs,
        originalDueDate: task.originalDueDate || task.dueDate || newTs,
        postponedCount: isPostpone ? (task.postponedCount || 0) + 1 : (task.postponedCount || 0),
        assignees: newAssignees
      });
    }
    setShowDatePicker(false);
    setDateAssigneeIdx(null);
  };
  const clearDueDate = () => {
    if (dateAssigneeIdx !== null) {
      const newAssignees = [...task.assignees];
      newAssignees[dateAssigneeIdx] = { ...newAssignees[dateAssigneeIdx], dueDate: null, originalDueDate: null, postponedCount: 0 };
      onUpdate({ ...task, assignees: newAssignees });
    } else {
      onUpdate({ ...task, dueDate: null });
    }
    setShowDatePicker(false);
    setDateAssigneeIdx(null);
  };

  const status = computeStatus ? computeStatus(task) : null;
  const allDone = task.assignees.length > 0 && task.assignees.every(a => a.status === "done");
  const dueCat = allDone ? "future" : getDueCategory(task.dueDate);
  const dueLabel = formatDueDate(task.dueDate);

  return (
    <div className="task-card">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          {editingTitle ? (
            <input
              autoFocus
              className="title"
              value={titleValue}
              onChange={e => setTitleValue(e.target.value)}
              onBlur={() => { if (titleValue.trim()) onUpdate({ ...task, title: titleValue.trim() }); setEditingTitle(false); }}
              onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); if (e.key === 'Escape') setEditingTitle(false); }}
              style={{ fontWeight: 600, fontSize: 15, width: '100%', padding: '2px 4px', margin: '-2px -4px', border: '1px solid var(--accent)', borderRadius: 4, outline: 'none' }}
            />
          ) : (
            <div className="title" onClick={() => { setTitleValue(task.title); setEditingTitle(true); }} style={{ cursor: 'text' }} title="Кликните чтобы изменить">{task.title}</div>
          )}
          {editingDesc ? (
            <textarea
              autoFocus
              value={descValue}
              onChange={e => setDescValue(e.target.value)}
              onBlur={() => { onUpdate({ ...task, description: descValue.trim() }); setEditingDesc(false); }}
              onKeyDown={e => { if (e.key === 'Escape') setEditingDesc(false); }}
              rows={3}
              style={{ width: '100%', fontSize: 13, padding: '4px 6px', margin: '4px 0 0 0', border: '1px solid var(--accent)', borderRadius: 4, outline: 'none', resize: 'vertical', fontFamily: 'inherit' }}
            />
          ) : (
            <div
              className="desc"
              onClick={() => { setDescValue(task.description || ""); setEditingDesc(true); }}
              style={{ cursor: 'text', minHeight: 18 }}
              title="Кликните чтобы изменить"
            >
              {task.description || <span className="small" style={{ opacity: 0.4 }}>+ Добавить описание</span>}
            </div>
          )}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexShrink: 0 }}>
          {showStatusBadge && status && (
            <span className={`badge badge-${status}`}>
              {status === 'done' ? 'Готово' : status === 'partial' ? 'Частично' : 'Ожидает'}
            </span>
          )}
          <button className="btn btn-ghost btn-sm" onClick={() => copyToClipboard(formatTaskForShare(task), showToast)} title="Скопировать задачу"><Copy size={13}/></button>
          {onDuplicate && <button className="btn btn-ghost btn-sm" onClick={onDuplicate} title="Дублировать задачу"><Plus size={13}/></button>}
          {onMerge && <button className="btn btn-ghost btn-sm" onClick={onMerge} title="Объединить с другой задачей"><Link2 size={13}/></button>}
          <button className="btn btn-ghost btn-sm btn-danger" onClick={onDelete}><Trash2 size={13}/></button>
        </div>
      </div>

      {meetingLabel && (
        <div style={{ marginBottom: 10 }}>
          <span className="small" style={{ cursor: onMeetingClick ? 'pointer' : 'default', textDecoration: onMeetingClick ? 'underline' : 'none' }} onClick={onMeetingClick}>
            <FileText size={11} style={{ display: 'inline', verticalAlign: 'middle', marginRight: 4 }} />
            {meetingLabel}
          </span>
        </div>
      )}

      <div className="due-row" style={{ position: 'relative' }}>
        {task.dueDate ? (
          <>
            <span className={`due-pill ${dueCat}`} title={task.originalDueDate && task.originalDueDate !== task.dueDate ? `Изначально: ${formatDueDate(task.originalDueDate)}` : ""}>
              <CalendarClock size={12}/> {dueLabel}
              {task.postponedCount > 0 && <span className="repeats" title="Перенесено раз">↻ {task.postponedCount}</span>}
            </span>
            <button className="btn btn-ghost btn-sm" onClick={() => setShowDatePicker(o => !o)}>
              <Hourglass size={12}/> Перенести
            </button>
          </>
        ) : (
          <button className="btn btn-ghost btn-sm" onClick={() => setShowDatePicker(o => !o)}>
            <CalendarClock size={12}/> Установить срок
          </button>
        )}
        {showDatePicker && (
          <DuePopover
            current={task.dueDate}
            onPick={changeDueDate}
            onClear={clearDueDate}
            onClose={() => setShowDatePicker(false)}
          />
        )}
      </div>

      {/* Link row — supports multiple links */}
      <div className="link-row">
        {getTaskLinks(task).map((url, idx) => (
          <div key={idx} style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
            <a href={url} target="_blank" rel="noopener noreferrer" className="link-chip" title={url}>
              <Link2 size={12}/>
              <span className="label">{getLinkLabel(url)}</span>
              <ExternalLink size={11} style={{ opacity: 0.6 }}/>
            </a>
            <button className="btn btn-ghost btn-sm" onClick={() => removeLinkAt(idx)} title="Удалить ссылку" style={{ padding: '2px 4px' }}>
              <X size={11}/>
            </button>
          </div>
        ))}
        {editingLink ? (
          <>
            <Link2 size={14} style={{ color: 'var(--ink-3)', flexShrink: 0 }}/>
            <input
              autoFocus
              placeholder="https://docs.google.com/..."
              value={linkValue}
              onChange={e => setLinkValue(e.target.value)}
              onKeyDown={e => {
                if (e.key === 'Enter') commitLink();
                if (e.key === 'Escape') { setEditingLink(false); setLinkValue(""); }
              }}
              style={{ flex: 1, minWidth: 200, padding: '6px 10px', fontSize: 13 }}
            />
            <button className="btn btn-ghost btn-sm" onClick={commitLink} title="Сохранить"><Check size={13}/></button>
            <button className="btn btn-ghost btn-sm" onClick={() => { setEditingLink(false); setLinkValue(""); }} title="Отмена"><X size={13}/></button>
          </>
        ) : (
          <button className="btn btn-ghost btn-sm" onClick={startEditLink} title={getTaskLinks(task).length ? "Добавить ещё ссылку" : "Прикрепить ссылку"}>
            <Plus size={12}/> {getTaskLinks(task).length ? "Ещё ссылка" : "Прикрепить ссылку"}
          </button>
        )}
      </div>

      <div className="assignees" style={{ display: 'block', marginTop: 4 }}>
        {task.assignees.length === 0 ? (
          <div className="small" style={{ padding: '6px 0' }}>Без исполнителя</div>
        ) : (
          task.assignees.map((a, i) => (
            <div key={i} className="assignee-row">
              {editingAssigneeIdx === i ? (
                <input
                  autoFocus
                  value={assigneeEditValue}
                  onChange={e => setAssigneeEditValue(e.target.value)}
                  onBlur={() => renameAssignee(i)}
                  onKeyDown={e => {
                    if (e.key === 'Enter') renameAssignee(i);
                    if (e.key === 'Escape') setEditingAssigneeIdx(null);
                  }}
                  style={{ flex: 1, padding: '4px 8px', fontSize: 14, fontWeight: 500 }}
                />
              ) : (
                <span
                  className="name"
                  title={`${a.name} · клик для переименования`}
                  onClick={() => startRename(i)}
                  style={{ cursor: 'pointer' }}
                >
                  {a.name}
                </span>
              )}
              <div className="status-segmented">
                <button
                  className={a.status === 'pending' || !a.status ? 'active pending' : ''}
                  onClick={() => setStatus(i, 'pending')}
                  title="Не сделано"
                >
                  <Square size={12}/> <span className="lbl">Не сделано</span>
                </button>
                <button
                  className={a.status === 'in-progress' ? 'active in-progress' : ''}
                  onClick={() => setStatus(i, 'in-progress')}
                  title="В работе"
                >
                  <Clock size={12}/> <span className="lbl">В работе</span>
                </button>
                <button
                  className={a.status === 'done' ? 'active done' : ''}
                  onClick={() => setStatus(i, 'done')}
                  title="Готово"
                >
                  <Check size={12}/> <span className="lbl">Готово</span>
                </button>
              </div>
              {/* Индивидуальный срок исполнителя */}
              {(() => {
                const aDue = a.dueDate || task.dueDate;
                const aCat = (a.status === "done") ? "future" : (aDue ? getDueCategory(aDue) : null);
                return aDue ? (
                  <span
                    className={`due-pill ${aCat}`}
                    style={{ cursor: 'pointer', fontSize: 10, padding: '2px 8px', flexShrink: 0 }}
                    onClick={() => { setDateAssigneeIdx(i); setShowDatePicker(true); }}
                    title={a.originalDueDate ? `Изначально: ${formatDateShort(a.originalDueDate)}` : "Клик — изменить срок"}
                  >
                    <Calendar size={10}/> {formatDateShort(aDue)}
                    {(a.postponedCount || 0) > 0 && <span className="repeats">↻{a.postponedCount}</span>}
                  </span>
                ) : (
                  <button
                    className="btn btn-ghost btn-sm"
                    style={{ fontSize: 10, padding: '2px 6px', opacity: 0.4, flexShrink: 0 }}
                    onClick={() => { setDateAssigneeIdx(i); setShowDatePicker(true); }}
                    title="Установить срок"
                  >
                    <Calendar size={10}/>
                  </button>
                );
              })()}
              <button className="remove" onClick={() => removeAssignee(i)} title="Удалить исполнителя">
                <X size={13}/>
              </button>
            </div>
          ))
        )}
        <div style={{ marginTop: 8 }}>
          {showAddAssignee ? (
            <AssigneePicker
              team={team}
              existing={task.assignees.map(a => a.name)}
              onSelect={(name) => {
                if (task.assignees.find(a => a.name.toLowerCase() === name.toLowerCase())) {
                  setShowAddAssignee(false);
                  return;
                }
                onUpdate({ ...task, assignees: [...task.assignees, { name, status: "pending", dueDate: task.dueDate || null }] });
                setShowAddAssignee(false);
              }}
              onCancel={() => setShowAddAssignee(false)}
            />
          ) : (
            <button className="btn btn-ghost btn-sm" onClick={() => setShowAddAssignee(true)} style={{ padding: '4px 10px', fontSize: 12 }}>
              <Plus size={12}/> исполнитель
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   DUE-DATE POPOVER
   ============================================================ */
function DuePopover({ current, onPick, onClear, onClose }) {
  const [customDate, setCustomDate] = useState(toInputDate(current));

  // close on outside click
  const ref = useRef(null);
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    setTimeout(() => document.addEventListener("mousedown", handler), 0);
    return () => document.removeEventListener("mousedown", handler);
  }, [onClose]);

  const quick = [
    { label: "Завтра", days: 1 },
    { label: "+3 дня", days: 3 },
    { label: "Через неделю", days: 7 },
    { label: "Через 2 недели", days: 14 },
  ];

  return (
    <div ref={ref} className="date-popover">
      <div className="small" style={{ marginBottom: 8, fontWeight: 600 }}>Быстрый выбор</div>
      <div className="quick">
        {quick.map(q => (
          <button key={q.label} onClick={() => onPick(addDays(Date.now(), q.days))}>{q.label}</button>
        ))}
      </div>
      <div className="small" style={{ marginBottom: 4, fontWeight: 600 }}>Своя дата</div>
      <input
        type="date"
        value={customDate}
        onChange={e => setCustomDate(e.target.value)}
        min={toInputDate(Date.now())}
      />
      <div className="pop-actions">
        {current && (
          <button className="btn btn-ghost btn-sm btn-danger" onClick={onClear}>
            <X size={13}/> Убрать срок
          </button>
        )}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 6 }}>
          <button className="btn btn-sm" onClick={onClose}>Отмена</button>
          <button className="btn btn-sm btn-primary" disabled={!customDate} onClick={() => customDate && onPick(fromInputDate(customDate))}>
            <Check size={13}/> Применить
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ASSIGNEE PICKER — input with team autocomplete dropdown
   ============================================================ */
function AssigneePicker({ team = [], existing = [], onSelect, onCancel, placeholder = "Имя или выбор из команды", autoFocus = true, compact = false }) {
  const [value, setValue] = useState("");
  const [open, setOpen] = useState(true);
  const wrapperRef = useRef(null);

  // Filter team: exclude already-assigned, match by alias/fullName/telegram
  const filtered = useMemo(() => {
    const v = value.trim().toLowerCase().replace(/^@/, "");
    const existingLower = existing.map(e => e.toLowerCase());
    return team.filter(m => {
      // skip already-added (compare by fullName or telegram)
      const fn = m.fullName.toLowerCase();
      const tg = (m.telegram || "").toLowerCase().replace(/^@/, "");
      if (existingLower.includes(fn) || (tg && existingLower.includes("@" + tg))) return false;
      if (!v) return true;
      if (fn.includes(v)) return true;
      if (tg.includes(v)) return true;
      return (m.aliases || []).some(a => a.toLowerCase().includes(v));
    });
  }, [team, existing, value]);

  useEffect(() => {
    const handler = (e) => {
      if (wrapperRef.current && !wrapperRef.current.contains(e.target)) {
        if (onCancel) onCancel();
      }
    };
    setTimeout(() => document.addEventListener("mousedown", handler), 0);
    return () => document.removeEventListener("mousedown", handler);
  }, [onCancel]);

  const commit = (name) => {
    const n = (name || value).trim();
    if (!n) return;
    onSelect(n);
    setValue("");
  };

  return (
    <div ref={wrapperRef} style={{ position: 'relative', display: 'inline-block', minWidth: compact ? 160 : 220 }}>
      <input
        autoFocus={autoFocus}
        value={value}
        placeholder={placeholder}
        onChange={e => { setValue(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onKeyDown={e => {
          if (e.key === 'Enter') { commit(); }
          if (e.key === 'Escape') { if (onCancel) onCancel(); }
        }}
        style={{ width: '100%', padding: compact ? '5px 10px' : '6px 10px', fontSize: 13 }}
      />
      {open && filtered.length > 0 && (
        <div className="assignee-dropdown">
          {filtered.map(m => (
            <button key={m.id} className="assignee-option" onClick={() => commit(m.fullName)} type="button">
              <span className="opt-name">{m.fullName}</span>
              {m.telegram && <span className="opt-tg">{m.telegram}</span>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   TEAM MODAL — справочник команды
   ============================================================ */
function TeamModal({ team, onClose, onSave, onDelete }) {
  const [editing, setEditing] = useState(null); // member object being edited, or "new"
  const [form, setForm] = useState({ fullName: "", aliases: "", telegram: "" });

  const startEdit = (member) => {
    setEditing(member);
    setForm({
      fullName: member.fullName || "",
      aliases: (member.aliases || []).join(", "),
      telegram: member.telegram || ""
    });
  };
  const startNew = () => {
    setEditing("new");
    setForm({ fullName: "", aliases: "", telegram: "" });
  };
  const cancelEdit = () => setEditing(null);

  const submit = async () => {
    const fullName = form.fullName.trim();
    if (!fullName) return;
    const aliases = form.aliases.split(",").map(a => a.trim()).filter(Boolean);
    let telegram = form.telegram.trim();
    if (telegram && !telegram.startsWith("@")) telegram = "@" + telegram;
    const member = editing === "new"
      ? { fullName, aliases, telegram }
      : { ...editing, fullName, aliases, telegram };
    await onSave(member);
    setEditing(null);
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" style={{ maxWidth: 580 }} onClick={e => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>

        </div>
        <div className="small" style={{ marginBottom: 16 }}>
          Имена из этого списка ИИ распознаёт в транскрипции (включая прозвища) и автоматически использует полное имя при назначении задач. Также эти люди появляются в подсказке при добавлении исполнителя.
        </div>

        {editing ? (
          <div className="card" style={{ background: 'var(--surface-2)', marginBottom: 12 }}>
            <label>Полное имя <span style={{ color: 'var(--warn)' }}>*</span></label>
            <input value={form.fullName} onChange={e => setForm(f => ({ ...f, fullName: e.target.value }))} placeholder="Иванов Иван" autoFocus />
            <label style={{ marginTop: 12 }}>Прозвища и варианты имени (через запятую)</label>
            <input value={form.aliases} onChange={e => setForm(f => ({ ...f, aliases: e.target.value }))} placeholder="Ваня, Иван, Иванов" />
            <label style={{ marginTop: 12 }}>Telegram-юзернейм</label>
            <input value={form.telegram} onChange={e => setForm(f => ({ ...f, telegram: e.target.value }))} placeholder="@username" />
            <div className="actions-row" style={{ marginTop: 16, justifyContent: 'flex-end' }}>
              <button className="btn" onClick={cancelEdit}>Отмена</button>
              <button className="btn btn-primary" onClick={submit} disabled={!form.fullName.trim()}>
                <Save size={14}/> Сохранить
              </button>
            </div>
          </div>
        ) : (
          <div style={{ marginBottom: 12 }}>
            <button className="btn btn-primary" onClick={startNew}><Plus size={14}/> Добавить сотрудника</button>
          </div>
        )}

        <div style={{ maxHeight: 380, overflowY: 'auto', marginRight: -8, paddingRight: 8 }}>
          {team.length === 0 ? (
            <div className="small">Список пуст</div>
          ) : (
            team.map(m => (
              <div key={m.id} className="team-row">
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 15 }}>{m.fullName}</div>
                  <div className="small" style={{ marginTop: 2 }}>
                    {m.telegram && <span className="opt-tg" style={{ marginRight: 8 }}>{m.telegram}</span>}
                    {(m.aliases || []).length > 0 && <span>{m.aliases.join(", ")}</span>}
                  </div>
                </div>
                <button className="btn btn-ghost btn-sm" onClick={() => startEdit(m)} title="Изменить">
                  <Edit3 size={13}/>
                </button>
                <button className="btn btn-ghost btn-sm btn-danger" onClick={() => onDelete(m.id)} title="Удалить">
                  <Trash2 size={13}/>
                </button>
              </div>
            ))
          )}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   TELEGRAM SHARE BUTTON
   Открывает Telegram (приложение или веб) с готовым текстом.
   Пользователь выбирает чат и подтверждает отправку.
   ============================================================ */
function TgSendButton({ text, showToast, tgConfig, compact = false }) {
  const [sending, setSending] = useState(false);
  const [showPicker, setShowPicker] = useState(false);
  const hasBot = !!tgConfig?.botToken;
  const hasWebhook = !!tgConfig?.webhookUrl;
  const canDirect = !_artifactStorage && (hasBot || hasWebhook) && tgConfig?.chats?.length > 0;

  const sendDirect = async (chat) => {
    setSending(true);
    setShowPicker(false);
    try {
      const clean = stripMarkdown(text);
      if (hasBot) {
        // Прямой Bot API
        const parts = splitForTelegram(clean);
        for (const part of parts) {
          const res = await fetch(`https://api.telegram.org/bot${tgConfig.botToken}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: chat.chatId, text: part, disable_web_page_preview: true })
          });
          const data = await res.json();
          if (!data.ok) throw new Error(data.description || "Ошибка Bot API");
        }
      } else if (hasWebhook) {
        // Make.com webhook
        const res = await fetch(tgConfig.webhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ chat_id: chat.chatId, chatId: chat.chatId, text: clean, chat_name: chat.name })
        });
        if (!res.ok) throw new Error("Webhook вернул " + res.status);
      }
      showToast?.(`✓ Отправлено в «${chat.name}»`);
    } catch (e) {
      showToast?.(`Ошибка: ${e.message}`);
    } finally {
      setSending(false);
    }
  };

  const shareViaUrl = () => {
    const clean = stripMarkdown((text || "").trim());
    if (!clean) { showToast?.("Нет текста"); return; }
    const encoded = encodeURIComponent(clean);
    const shareUrl = `https://t.me/share/url?url=&text=${encoded}`;
    if (shareUrl.length < 4000) {
      const a = document.createElement("a");
      a.href = shareUrl; a.target = "_blank"; a.rel = "noopener noreferrer";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      showToast?.("📤 Открываю Telegram — выберите чат и нажмите «Отправить»");
    } else {
      copyToClipboard(text, () => {});
      showToast?.("📋 Текст скопирован! Откройте Telegram → зайдите в чат → вставьте (Ctrl+V)");
    }
  };

  const handleClick = () => {
    if (!canDirect) { shareViaUrl(); return; }
    if (tgConfig.chats.length === 1) { sendDirect(tgConfig.chats[0]); return; }
    setShowPicker(p => !p);
  };

  return (
    <div style={{ position: 'relative', display: 'inline-block' }}>
      <button className="btn btn-sm btn-tg" onClick={handleClick} disabled={sending} title={canDirect ? "Отправить ботом напрямую в чат" : "Открыть Telegram для пересылки"}>
        {sending ? <Loader2 size={13} className="spin"/> : <Send size={13}/>}
        {canDirect
          ? (tgConfig.chats.length === 1 ? ` Отправить в «${tgConfig.chats[0].name}»` : ` Отправить ботом`)
          : ` Поделиться в Telegram`
        }
      </button>
      {showPicker && canDirect && (
        <div className="tg-chat-picker">
          <div className="small" style={{ padding: '6px 10px 4px', opacity: 0.7 }}>Выберите чат:</div>
          {tgConfig.chats.map(chat => (
            <button key={chat.id} className="tg-chat-option" onClick={() => sendDirect(chat)}>
              <Send size={12}/> {chat.name}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   TELEGRAM SETTINGS MODAL
   ============================================================ */
function TelegramModal({ config, onSave, onClose }) {
  const [botToken, setBotToken] = useState(config?.botToken || "");
  const [webhookUrl, setWebhookUrl] = useState(config?.webhookUrl || "");
  const [chats, setChats] = useState(config?.chats || []);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [newChat, setNewChat] = useState({ name: "", chatId: "" });
  const [addingChat, setAddingChat] = useState(false);
  const [saving, setSaving] = useState(false);

  const testConnection = async () => {
    if (chats.length === 0) return;
    setTesting(true); setTestResult(null);
    try {
      const now = new Date().toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
      if (botToken.trim()) {
        // Тест Bot API
        const meRes = await fetch(`https://api.telegram.org/bot${botToken.trim()}/getMe`);
        const meData = await meRes.json();
        if (!meData.ok) throw new Error(meData.description || "Неверный токен");
        const sendRes = await fetch(`https://api.telegram.org/bot${botToken.trim()}/sendMessage`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ chat_id: chats[0].chatId, text: `🧪 Тест · ${now}\nБот: @${meData.result.username}` })
        });
        const sendData = await sendRes.json();
        if (!sendData.ok) throw new Error(sendData.description || "Ошибка отправки");
        setTestResult({ ok: true, msg: `✓ Bot API: @${meData.result.username} → «${chats[0].name}»` });
      } else if (webhookUrl.trim()) {
        // Тест webhook
        const res = await fetch(webhookUrl.trim(), {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ chat_id: chats[0].chatId, chatId: chats[0].chatId, text: `🧪 Тест с сайта · ${now}`, chat_name: chats[0].name })
        });
        if (!res.ok) throw new Error("Webhook вернул " + res.status);
        setTestResult({ ok: true, msg: `✓ Webhook → «${chats[0].name}» (проверьте Telegram)` });
      } else {
        throw new Error("Заполните Bot Token ИЛИ Webhook URL");
      }
    } catch (e) {
      setTestResult({ ok: false, msg: e.message });
    } finally { setTesting(false); }
  };
  const addChat = () => {
    const name = newChat.name.trim(), chatId = newChat.chatId.trim();
    if (!name || !chatId) return;
    setChats(prev => [...prev, { id: String(Date.now()), name, chatId }]);
    setNewChat({ name: "", chatId: "" }); setAddingChat(false);
  };
  const removeChat = (id) => setChats(prev => prev.filter(c => c.id !== id));
  const save = async () => {
    if (!botToken.trim() && !webhookUrl.trim()) return;
    setSaving(true);
    await onSave({ botToken: botToken.trim(), webhookUrl: webhookUrl.trim(), chats });
    setSaving(false); onClose();
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" style={{ maxWidth: 580 }} onClick={e => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
          <div className="display" style={{ fontSize: 22 }}>Telegram</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}><X size={16}/></button>
        </div>
        <div className="small" style={{ marginBottom: 20 }}>Заполните <strong>один из двух</strong> вариантов отправки. Можно настроить оба — приоритет у Bot API.</div>

        <div style={{ padding: 12, background: 'var(--surface-2)', borderRadius: 8, marginBottom: 14 }}>
          <label style={{ marginBottom: 6 }}>Вариант 1 · Bot API (быстрее)</label>
          <input type="password" placeholder="Токен бота от @BotFather: 1234567890:ABC..." value={botToken} onChange={e => { setBotToken(e.target.value); setTestResult(null); }} style={{ fontFamily: 'monospace', fontSize: 12 }} />
        </div>

        <div style={{ padding: 12, background: 'var(--surface-2)', borderRadius: 8, marginBottom: 14 }}>
          <label style={{ marginBottom: 6 }}>Вариант 2 · Make.com Webhook</label>
          <input placeholder="https://hook.us2.make.com/..." value={webhookUrl} onChange={e => { setWebhookUrl(e.target.value); setTestResult(null); }} style={{ fontFamily: 'monospace', fontSize: 12 }} />
        </div>

        <div style={{ marginTop: 20, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <label style={{ margin: 0 }}>Чаты</label>
          <button className="btn btn-sm" onClick={() => setAddingChat(a => !a)}><Plus size={13}/> Добавить чат</button>
        </div>
        {addingChat && (
          <div className="card" style={{ background: 'var(--surface-2)', marginTop: 10 }}>
            <label>Название</label>
            <input placeholder="МОП АРТЕМ" value={newChat.name} onChange={e => setNewChat(n => ({ ...n, name: e.target.value }))} autoFocus />
            <label style={{ marginTop: 10 }}>Chat ID</label>
            <input placeholder="-1001234567890" value={newChat.chatId} onChange={e => setNewChat(n => ({ ...n, chatId: e.target.value }))} style={{ fontFamily: 'monospace' }} />
            <div className="actions-row" style={{ marginTop: 12, justifyContent: 'flex-end' }}>
              <button className="btn btn-sm" onClick={() => setAddingChat(false)}>Отмена</button>
              <button className="btn btn-sm btn-primary" onClick={addChat} disabled={!newChat.name.trim() || !newChat.chatId.trim()}><Check size={13}/> Добавить</button>
            </div>
          </div>
        )}
        <div style={{ marginTop: 10 }}>
          {chats.length === 0 ? (
            <div className="small" style={{ padding: '8px 0' }}>Чатов нет. Добавьте хотя бы один.</div>
          ) : chats.map(chat => (
            <div key={chat.id} className="team-row">
              <div style={{ flex: 1 }}><div style={{ fontWeight: 600 }}>{chat.name}</div><code style={{ fontSize: 12, color: 'var(--ink-3)' }}>{chat.chatId}</code></div>
              <button className="btn btn-ghost btn-sm btn-danger" onClick={() => removeChat(chat.id)}><Trash2 size={13}/></button>
            </div>
          ))}
        </div>
        {(botToken.trim() || webhookUrl.trim()) && chats.length > 0 && (
          <div style={{ marginTop: 16, padding: 12, background: 'var(--surface-2)', borderRadius: 8 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
              <button className="btn btn-sm" onClick={testConnection} disabled={testing}>
                {testing ? <Loader2 size={13} className="spin"/> : <Send size={13}/>} Тест-сообщение
              </button>
              <span className="small" style={{ flex: 1 }}>Через {botToken.trim() ? "Bot API" : "Webhook"} в «{chats[0]?.name}»</span>
            </div>
            {testResult && (
              <div style={{ marginTop: 8, padding: 8, borderRadius: 6, fontSize: 13, background: testResult.ok ? 'var(--accent-tint)' : 'var(--warn-tint)', color: testResult.ok ? 'var(--accent-2)' : 'var(--warn)' }}>
                {testResult.msg}
              </div>
            )}
          </div>
        )}
        <div className="actions-row" style={{ marginTop: 24, justifyContent: 'flex-end' }}>
          <button className="btn" onClick={onClose}>Отмена</button>
          <button className="btn btn-primary" onClick={save} disabled={(!botToken.trim() && !webhookUrl.trim()) || saving}>
            {saving ? <Loader2 size={13} className="spin"/> : <Save size={13}/>} Сохранить
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   MINIMAL MARKDOWN RENDERER
   ============================================================ */
function renderMarkdown(text) {
  if (!text) return null;
  const lines = text.split('\n');
  return lines.map((line, idx) => {
    const parts = [];
    let remaining = line;
    let key = 0;
    while (remaining.length > 0) {
      // Ищем самый ранний матч: **bold** или [text](url)
      const boldMatch = remaining.match(/\*\*(.+?)\*\*/);
      const linkMatch = remaining.match(/\[(.+?)\]\((.+?)\)/);

      let earliest = null, match = null;
      if (boldMatch && (!linkMatch || boldMatch.index <= linkMatch.index)) {
        earliest = "bold"; match = boldMatch;
      } else if (linkMatch) {
        earliest = "link"; match = linkMatch;
      }

      if (earliest === "bold") {
        const before = remaining.slice(0, match.index);
        if (before) parts.push(<span key={key++}>{before}</span>);
        parts.push(<strong key={key++}>{match[1]}</strong>);
        remaining = remaining.slice(match.index + match[0].length);
      } else if (earliest === "link") {
        const before = remaining.slice(0, match.index);
        if (before) parts.push(<span key={key++}>{before}</span>);
        parts.push(
          <a key={key++} href={match[2]} target="_blank" rel="noopener noreferrer"
             style={{ color: 'var(--accent)', textDecoration: 'underline', fontWeight: 500 }}>
            {match[1]}
          </a>
        );
        remaining = remaining.slice(match.index + match[0].length);
      } else {
        parts.push(<span key={key++}>{remaining}</span>);
        remaining = "";
      }
    }
    return <div key={idx} style={{ minHeight: '1.55em' }}>{parts.length > 0 ? parts : '\u00A0'}</div>;
  });
}
