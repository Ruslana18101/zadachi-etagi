name: Ping Supabase

on:
  schedule:
    - cron: '0 9 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep Supabase awake
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/kv_store?select=key&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
          echo " — ping sent at $(date)"
