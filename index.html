const cloud = {
  async fetchAll() {
    const res = await fetch(SUPABASE_URL + "/rest/v1/kv_store?select=key,value", { headers: _supaHeaders });
    if (!res.ok) throw new Error("Supabase GET " + res.status);
    return await res.json();
  },
  async upsert(key, value) {
    await fetch(SUPABASE_URL + "/rest/v1/kv_store", {
      method: "POST",
      headers: { ..._supaHeaders, "Prefer": "resolution=merge-duplicates" },
      body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
    });
  },
  async remove(key) {
    await fetch(SUPABASE_URL + "/rest/v1/kv_store?key=eq." + encodeURIComponent(key), {
      method: "DELETE", headers: _supaHeaders
    });
  }
};

// Начальная синхронизация: cloud → localStorage (или localStorage → cloud при первом запуске)
const syncFromCloud = async () => {
  try {
    const rows = await cloud.fetchAll();
    if (rows.length > 0) {
      // Облако имеет данные → загружаем в localStorage
      for (const { key, value } of rows) localStorage.setItem(key, value);
      // Удаляем локальные ключи которых нет в облаке (облако = источник правды)
      const cloudKeys = new Set(rows.map(r => r.key));
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (isAppKey(k) && !cloudKeys.has(k)) localStorage.removeItem(k);
      }
      console.log("☁ Синхронизация: загружено " + rows.length + " записей из облака");
    } else {
      // Облако пустое → выгружаем локальные данные в облако
      let pushed = 0;
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (isAppKey(k)) { await cloud.upsert(k, localStorage.getItem(k)); pushed++; }
      }
      if (pushed) console.log("☁ Первая синхронизация: выгружено " + pushed + " записей в облако");
    }
  } catch (e) {
    console.warn("☁ Синхронизация не удалась, работаем локально:", e.message);
  }
};

// ═══ STORAGE LAYER (localStorage + cloud sync) ═══
const storage = {
  async list(prefix) {
    if (_artifactStorage) {
      try { const r = await _artifactStorage.list(prefix); return r?.keys || []; }
      catch { return []; }
    }
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!prefix || k.startsWith(prefix)) keys.push(k);
    }
    return keys;
  },
  async getAll(prefix) {
    const keys = await this.list(prefix);
    const items = [];
    for (const key of keys) {
      try {
        if (_artifactStorage) {
          const r = await _artifactStorage.get(key);
          if (r?.value) items.push(JSON.parse(r.value));
        } else {
          const v = localStorage.getItem(key);
          if (v) items.push(JSON.parse(v));
        }
      } catch {}
    }
    return items;
  },
  async set(key, value) {
    const v = JSON.stringify(value);
    if (_artifactStorage) {
      try { return await _artifactStorage.set(key, v); }
      catch (e) { console.error("storage.set failed", e); return null; }
    }
    localStorage.setItem(key, v);
    // Асинхронная синхронизация в облако (не блокирует UI)
    cloud.upsert(key, v).catch(e => console.warn("☁ cloud.upsert:", e.message));
    return { key, value: v };
  },
  async remove(key) {
    if (_artifactStorage) {
      try { return await _artifactStorage.delete(key); }
      catch (e) { console.error("storage.delete failed", e); return null; }
    }
    localStorage.removeItem(key);
    cloud.remove(key).catch(e => console.warn("☁ cloud.remove:", e.message));
    return { key, deleted: true };
  }
};

const RU_MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

  const d = new Date(ts);
  return `${d.getDate()} ${RU_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
};
const formatDateShort = (ts) => {
  const d = new Date(ts);
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
};

/* ============================================================
   DUE DATE HELPERS
   ============================================================ */
const dateOnly = (ts) => {
  const d = new Date(ts);
  return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
};
const todayStart = () => dateOnly(Date.now());

const daysUntil = (dueDate) => {
  if (!dueDate) return null;
  return Math.floor((dateOnly(dueDate) - todayStart()) / 86400000);
};

const getDueCategory = (dueDate) => {
  if (!dueDate) return "no-date";
  const d = daysUntil(dueDate);
  if (d < 0) return "overdue";
  if (d === 0) return "today";
  if (d <= 7) return "week";
  return "future";
};

const formatDueDate = (timestamp) => {
  if (!timestamp) return "";
  const d = daysUntil(timestamp);
  const dt = new Date(timestamp);
  const dateStr = `${dt.getDate()} ${RU_MONTHS[dt.getMonth()].slice(0, 3)}`;
  if (d === 0) return `Сегодня · ${dateStr}`;
  if (d === 1) return `Завтра · ${dateStr}`;
  if (d === -1) return `Вчера · ${dateStr}`;
  if (d < 0) return `Просрочено на ${-d} дн · ${dateStr}`;
  if (d > 1 && d <= 7) return `Через ${d} дн · ${dateStr}`;
  return `${dateStr} ${dt.getFullYear()}`;
};

const toInputDate = (ts) => {

/* ============================================================
   ICS CALENDAR EXPORT
   ============================================================ */
const icsEscape = (s = "") => s.replace(/\\/g, "\\\\").replace(/\n/g, "\\n").replace(/,/g, "\\,").replace(/;/g, "\\;");
const icsDate = (ts) => {
  const d = new Date(ts);
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
};
const icsDateTime = (ts) => {
  const d = new Date(ts);
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}${pad(d.getUTCSeconds())}Z`;
};
const generateICS = (tasks) => {
  const now = icsDateTime(Date.now());
  const events = tasks.filter(t => t.dueDate).map(t => {
    const pending = (t.assignees || []).filter(a => a.status !== "done").map(a => a.name);
    const tlinks = getTaskLinks(t);
    const descParts = [
      pending.length ? "Исполнители: " + pending.join(", ") : "",
      t.description ? t.description : "",
      ...tlinks.map(l => "Ссылка: " + l)
    ].filter(Boolean);
    const lines = [
      "BEGIN:VEVENT",
      `UID:${t.id}@meeting-agenda`,
      `DTSTAMP:${now}`,
      `DTSTART;VALUE=DATE:${icsDate(t.dueDate)}`,
      `DTEND;VALUE=DATE:${icsDate(addDays(t.dueDate, 1))}`,
      `SUMMARY:📋 ${icsEscape(t.title)}`,
      `DESCRIPTION:${icsEscape(descParts.join("\n"))}`,
      ...(tlinks.length ? [`URL:${icsEscape(tlinks[0])}`] : []),
      "BEGIN:VALARM",
      "TRIGGER:-PT12H",
      "ACTION:DISPLAY",
      `DESCRIPTION:${icsEscape(t.title)}`,
      "END:VALARM",
      "END:VEVENT"
    ];
    return lines.join("\r\n");
  });
  return ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Meeting Agenda//RU", "CALSCALE:GREGORIAN", ...events, "END:VCALENDAR"].join("\r\n");
};

const downloadICS = (tasks, filename = "tasks.ics") => {
  const ics = generateICS(tasks);
  const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
};

// Убирает markdown перед отправкой/копированием в Telegram:
// **bold** → bold, [text](url) → text\nurl
const stripMarkdown = (text) => (text || "")
  .replace(/\*\*(.+?)\*\*/g, "$1")
  .replace(/\[(.+?)\]\((.+?)\)/g, "$1\n$2");

// Делит длинный текст на куски ≤4000 символов для Telegram (лимит 4096).
// Старается резать по двойному переносу (между абзацами), потом по одному, потом по слову.
const splitForTelegram = (text) => {
  const LIMIT = 4000;
  if (!text || text.length <= LIMIT) return [text];
  const parts = [];
  let remaining = text;
  while (remaining.length > LIMIT) {
    let cut = remaining.lastIndexOf("\n\n", LIMIT);
    if (cut < LIMIT * 0.5) cut = remaining.lastIndexOf("\n", LIMIT);
    if (cut < LIMIT * 0.5) cut = remaining.lastIndexOf(" ", LIMIT);
    if (cut < 1) cut = LIMIT;
    parts.push(remaining.slice(0, cut).trim());
    remaining = remaining.slice(cut).trim();
  }
  if (remaining) parts.push(remaining);
  return parts;
};

// Надёжное копирование — fallback через textarea если clipboard API заблокирован
const copyToClipboard = async (text, showToast) => {
  const clean = stripMarkdown(text);
  try {
    await navigator.clipboard.writeText(clean);
    showToast?.("Скопировано в буфер");
  } catch {
    try {
      const ta = document.createElement("textarea");
      ta.value = clean;
      ta.style.cssText = "position:fixed;left:-9999px;top:-9999px;opacity:0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      showToast?.("Скопировано в буфер");
    } catch {
      showToast?.("Не удалось скопировать — выделите текст вручную");
    }
  }
};

// Безопасный лимит длины URL — большинство браузеров принимают до ~8000 символов
const URL_MAX = 7500;

// Делит текст на части так, чтобы итоговый URL после URL-кодирования влез в лимит
const splitForWebhook = (webhookUrl, chatId, text) => {
  const sep = webhookUrl.includes("?") ? "&" : "?";
  const skeleton = `${webhookUrl}${sep}chat_id=${encodeURIComponent(chatId)}&text=&_=${Date.now()}`;
  const budget = URL_MAX - skeleton.length;
  const fits = (chunk) => encodeURIComponent(chunk).length <= budget;

  if (fits(text)) return [text];
  const parts = [];
  let current = "";
  for (const line of text.split("\n")) {
    const next = current ? current + "\n" + line : line;
    if (fits(next)) { current = next; continue; }
    if (current) { parts.push(current); current = ""; }
    if (fits(line)) { current = line; continue; }
    let buf = "";
    for (const ch of line) {
      if (fits(buf + ch)) buf += ch;
      else { parts.push(buf); buf = ch; }
    }
    current = buf;
  }
  if (current) parts.push(current);
  return parts;
};

// Отправка одной части через загрузку <img>. Браузер выпускает GET к img-src,
// что обходит ограничение connect-src и sandbox-form-action одновременно.
// Make.com возвращает текст, не картинку → img.onerror сработает, но это значит
// запрос ушёл и был принят (а не сетевая ошибка).
const sendChunkViaImage = (webhookUrl, chatId, text) => {
  return new Promise((resolve, reject) => {
    const sep = webhookUrl.includes("?") ? "&" : "?";
    const url = `${webhookUrl}${sep}chat_id=${encodeURIComponent(chatId)}&text=${encodeURIComponent(text)}&_=${Date.now()}`;
    if (url.length > URL_MAX) {
      reject(new Error(`URL слишком длинный (${url.length} символов)`));
      return;
    }
    const img = new Image();
    let done = false;
    const finish = () => { if (!done) { done = true; resolve(); } };
    img.onload = finish;
    img.onerror = finish; // ответ — не изображение, но запрос ушёл
    img.src = url;
    setTimeout(() => {
      if (!done) { done = true; reject(new Error("Таймаут — Make.com не ответил за 10 сек")); }
    }, 10000);
  });
};

// Песочница Claude блокирует ВСЕ способы прямой отправки наружу (fetch, form, img).

Повестка ВСЕГДА начинается с заголовка на отдельной строке, ДО первого нумерованного пункта:

\`**СОБРАНИЕ DD.MM.YYYY г.**\`

— это **СОБРАНИЕ** капслоком + точная дата собрания + " г." на конце. Дату определяй из транскрипции: ищи упоминания дат в начале разговора, реплики типа "сегодня двадцатое мая", "пятница пятое число", и т.п. Используй год 2026 если в транскрипции год не упомянут явно. Если дату определить точно не получается — пиши \`**СОБРАНИЕ __.__.____ г.**\` чтобы Руслана дозаполнила вручную.

После заголовка — пустая строка, потом нумерованные пункты.

Пример правильного начала:

до 06.03.2026 г. переговорю...

ФОРМАТ: нумерованный список (1., 2., 3., ...). Каждый пункт — отдельная тема, решение, задача или анонс.

ЗАГОЛОВКИ: каждый пункт начинается с заголовка темы, ОБРАМЛЁННОГО эмодзи с двух сторон. Эмодзи подбирается по смыслу темы.

Палитра эмодзи по типам:
• 📸 — фото, контент, медиа
• 📖 — обучение, курсы, УП
• 🏘 🏡 — недвижимость, объекты, ЗН (загородная недвижимость)
• ☎ — звонки, заявки, прозвоны
• 📊 — аналитика, отчёты, аудит
• ⛔️ — увольнения, "красная зона"
• ‼ ‼️ — критично, обязательно
• 🆕 — новая или давно стоящая важная задача
• 🗣 — обсуждения, регламенты, встречи
• 🎁 — преференции, бонусы
• 🫶🏼 🤙🏼 — конкурсы, мотивация

ОТДЕЛЬНО от текста повестки извлеки задачи для трекера. Задача = есть конкретное действие + желательно исполнитель и/или дедлайн.

ЯВЛЯЕТСЯ задачей:
✅ "до 06.03.2026 г. создать файл по застройщикам" → задача для Голубева и Парфеновой
✅ "Проконтролируйте курсы УП до 03.03" → задача для всех руководителей (assignees: ["Руководители групп"])
✅ "Жду ответ до пятницы от @protsenko_realty" → задача для @protsenko_realty
✅ "Каждый риелтор должен снизить цены минимум на 3 объекта" → задача для всех риэлторов

ОБЯЗАТЕЛЬНО: Если Руслана (ведущая собрание) говорит от ПЕРВОГО ЛИЦА: "я скину", "переговорю", "пришлю", "вернусь к вам с ОС", "я в понедельник озвучу", "скину файл", "предоставлю", "вышлю" — это ЗАДАЧА для "Наговицина Руслана". Обязательно добавь в tasks.

НЕ задача (только в повестке, не в трекере):
❌ Анонс события ("Королева приедет 04.03")
❌ Общая информация о решениях ("Запускаем биржу объектов с 21.04")
❌ Описание ситуации ("Конверсия из заявки в договор")
❌ Объявление правила ("С 5 мая больше не принимаются скриншоты")

ИМЕНА: бери ИСКЛЮЧИТЕЛЬНО из транскрипции — Голубев, Парфенова, Вашута, Турандина, Королева, Лесняк, Проценко, Лукина, Депутатова и т.д. Не выдумывай.

ВАЖНО О ТРАНСКРИПЦИИ

Транскрипции — СЫРЫЕ, разговорные, с шумом, междометиями, перебиваниями, матом, флудом. Игнорируй болтовню, выделяй сигнал:
• Принятые решения
• Назначенные задачи (кто что делает к какой дате)
• Анонсы событий и встреч
• Изменения в правилах/регламентах
• Упоминания дедлайнов

Название собрания (поле title): 2-5 слов, отражающих главную тему. Примеры: "Стратегия по загородной недвижимости", "Изменение схемы ИП и мотивация", "Кадровые вопросы и задачи на май".

  .hint { color: var(--ink-3); font-size: 12px; margin-top: 6px; }

  details { margin-top: 12px; }
  details summary { cursor: pointer; color: var(--ink-2); font-size: 13px; padding: 6px 0; user-select: none; font-weight: 500; }
  details summary:hover { color: var(--accent); }

  .small { font-size: 12px; color: var(--ink-3); }

  /* ═══ DROP ZONE ═══ */
  .drop-zone { position: relative; transition: all 0.2s; }
  .drop-zone.dragging { border-color: var(--accent); border-style: dashed; }
  .drop-overlay {
    position: absolute; inset: 0;
    background: rgba(236, 245, 239, 0.97);
    border: 2px dashed var(--accent); border-radius: var(--radius);
    display: flex; flex-direction: column;

    gap: 8px; color: var(--accent-2); font-weight: 600;

  .file-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; margin-bottom: 12px;
    background: var(--accent-tint); border: 1.5px solid var(--accent);
    border-radius: var(--radius-xs); color: var(--accent-2); font-size: 13px; font-weight: 600;
  }

  /* ═══ ASSIGNEE ROW — task detail ═══ */
  .assignee-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0; border-bottom: 1px solid var(--line);
  }
  .assignee-row:last-child { border-bottom: none; }
  .assignee-row .name { flex: 1; font-weight: 600; font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .assignee-row .remove { padding: 4px 6px; color: var(--ink-3); border: none; background: transparent; cursor: pointer; border-radius: 4px; }
  .assignee-row .remove:hover { color: var(--warn); background: var(--warn-tint); }

  /* ═══ STATUS SEGMENTED CONTROL — TickTick-inspired ═══ */
  .status-segmented {
    display: inline-flex; border: 1.5px solid var(--line);
    border-radius: 8px; overflow: hidden; background: var(--surface); flex-shrink: 0;
  }
  .status-segmented button {
    padding: 5px 10px; border: none; background: transparent; cursor: pointer;
    color: var(--ink-3); font-family: inherit; font-size: 11px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 4px;
    border-right: 1px solid var(--line); transition: all 0.15s;
  }
  .status-segmented button:last-child { border-right: none; }
  .status-segmented button:hover { background: var(--bg-tint); color: var(--ink-2); }
  .status-segmented button.active { font-weight: 700; }
  .status-segmented button.active.pending { background: var(--bg-tint); color: var(--ink); }
  .status-segmented button.active.in-progress { background: #fef9ec; color: #7a5d0f; }
  .status-segmented button.active.done { background: var(--accent-tint); color: var(--accent-2); }
  .status-segmented .lbl { display: inline; }
  @media (max-width: 540px) { .status-segmented .lbl { display: none; } .status-segmented button { padding: 6px 8px; } }

  /* ═══ DUE DATE PILL — color-coded (Todoist-style) ═══ */
  .due-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px; font-size: 11px;
    font-weight: 700; border: 1.5px solid;
  }
  .due-pill.overdue { background: var(--warn-tint); color: var(--warn); border-color: #e8a09a; }
  .due-pill.today { background: #fef9ec; color: #7a5d0f; border-color: var(--pending); }
  .due-pill.week { background: #fef9ec; color: #7a5d0f; border-color: #e6c95a; }
  .due-pill.future { background: var(--surface-2); color: var(--ink-2); border-color: var(--line-2); }
  .due-pill.no-date { background: var(--bg-tint); color: var(--ink-3); border-color: var(--line); }
  .due-pill .repeats { background: rgba(0,0,0,0.08); padding: 1px 6px; border-radius: 10px; font-size: 10px; margin-left: 4px; }

  .due-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 10px 0; }

  /* ═══ DATE PICKER POPOVER ═══ */
  .date-popover {
    position: absolute; z-index: 30; background: var(--surface);
    border: 1.5px solid var(--line-2); border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);

  .date-popover .quick { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .date-popover .quick button {
    padding: 5px 10px; font-size: 11px; font-weight: 600;
    border: 1.5px solid var(--line); background: var(--surface-2);
    border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.12s;

  .date-popover .quick button:hover { background: var(--accent-tint); border-color: var(--accent); color: var(--accent-2); }
  .date-popover input[type=date] { padding: 8px 10px; font-size: 13px; }
  .date-popover .pop-actions { display: flex; gap: 6px; justify-content: space-between; margin-top: 10px; }

  /* ═══ DIGEST BANNER — gradient cards (TickTick-style) ═══ */
  .digest { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  @media (max-width: 640px) { .digest { grid-template-columns: repeat(2, 1fr); } }
  .digest-card {
    border: none; background: var(--surface);
    border-radius: var(--radius-sm); padding: 16px 18px; cursor: pointer; text-align: left;
    font-family: inherit; transition: all 0.2s ease;
    display: flex; flex-direction: column; gap: 6px;

  .digest-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .digest-card.active {
    background: var(--ink); color: white; border-color: var(--ink);
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);

  }
  .digest-card .label { font-size: 11px; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .digest-card .count { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600; line-height: 1; }
  .digest-card.overdue:not(.active) {
    background: linear-gradient(135deg, #fef0ee, #fde2de);

  .digest-card.today:not(.active) {

  .reminder-toolbar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
    padding: 12px 16px; background: var(--surface);
    border: none; border-radius: var(--radius-sm);
    align-items: center; box-shadow: var(--shadow-sm);
  }

  /* ═══ LINK CHIP ═══ */
  .link-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 6px;
    background: #eef4ff; color: #1e4382; border: 1.5px solid #c7d8f5;
    font-size: 11px; font-weight: 700; text-decoration: none;
    transition: all 0.12s; cursor: pointer; max-width: 100%;
  }
  .link-chip:hover { background: #dde9fa; border-color: #9ab8e5; }
  .link-chip .label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
  .link-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 6px 0 10px; }

  /* ═══ MEETING TYPE TOGGLE ═══ */
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  @media (max-width: 540px) { .type-toggle { grid-template-columns: 1fr; } }
  .type-btn {
    text-align: left; padding: 16px 18px; border: 1.5px solid var(--line-2);
    background: var(--surface); border-radius: var(--radius-sm); cursor: pointer;
    font-family: inherit; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
    color: var(--ink-2); font-weight: 600;
    box-shadow: var(--shadow-sm);
  }
  .type-btn:hover { border-color: var(--ink-3); box-shadow: var(--shadow-md); }
  .type-btn.active {
    border-color: var(--accent); background: var(--accent-tint); color: var(--accent-2);
    box-shadow: 0 2px 10px rgba(45,122,79,0.15);
  }
  .type-btn .type-sub { font-size: 11px; font-weight: 400; opacity: 0.6; }

  /* ═══ BADGES — personal/employee ═══ */
  .employee-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: var(--accent-tint); color: var(--accent-2); border-radius: 20px; font-size: 10px; font-weight: 700; }
  .personal-mark { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: #f5eedd; color: #7a5d0f; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }

  /* ═══ EMPLOYEE CARDS — elevated grid (Things-style) ═══ */
  .employee-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .employee-card {
    background: var(--surface); border: none;
    border-radius: var(--radius); padding: 20px;
    cursor: pointer; transition: all 0.2s ease;
    text-align: left; font-family: inherit;
    display: flex; flex-direction: column; gap: 10px;
    box-shadow: var(--shadow-sm);
  }
  .employee-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
  }
  .employee-card .avatar {
    width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent-tint), #d4ead9);
    color: var(--accent-2); display: flex; align-items: center;
    justify-content: center; font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 600;
  }
  .employee-card .ename { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500; }
  .employee-card .estat { font-size: 11px; color: var(--ink-3); font-weight: 500; }

  /* ═══ ASSIGNEE PICKER ═══ */
  .assignee-dropdown {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--surface); border: 1.5px solid var(--line-2);
    border-radius: var(--radius-xs); margin-top: 4px;
    box-shadow: var(--shadow-lg);
    max-height: 260px; overflow-y: auto; z-index: 40;
    padding: 4px;
  }
  .assignee-option {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 8px 10px; border: none; background: transparent;
    cursor: pointer; font-family: inherit; font-size: 13px; color: var(--ink);
    border-radius: 6px; text-align: left; gap: 8px; transition: background 0.12s;
  }
  .assignee-option:hover { background: var(--accent-tint); }
  .assignee-option .opt-name { font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .opt-tg { font-size: 10px; color: var(--accent); background: var(--accent-tint); padding: 2px 8px; border-radius: 10px; font-weight: 700; flex-shrink: 0; }

  /* ═══ TEAM MODAL ═══ */
  .team-row {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px; border: none; box-shadow: var(--shadow-sm);
    background: var(--surface); border-radius: var(--radius-xs); margin-bottom: 8px;
  }
  .team-row .small { color: var(--ink-3); }

  /* ═══ TELEGRAM ═══ */
  .btn-tg { background: #e8f5fd; color: #0e76a8; border-color: #b8ddf5; }
  .btn-tg:hover { background: #d4ecfb; border-color: #7ec8e3; box-shadow: 0 2px 8px rgba(14,118,168,0.15); }
  .btn-tg-connected { background: #e8f5fd; color: #0e76a8; border-color: #7ec8e3; }

  .tg-chat-picker {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: var(--surface); border: 1.5px solid var(--line-2);
    border-radius: var(--radius-sm); box-shadow: var(--shadow-lg);
    min-width: 220px; z-index: 50; padding: 4px;
  }
  .tg-chat-option {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 9px 12px; border: none; background: transparent;
    cursor: pointer; font-family: inherit; font-size: 13px;
    color: var(--ink); border-radius: 7px; text-align: left;
    transition: background 0.12s;
  }
  .tg-chat-option:hover { background: var(--accent-tint); }

  /* ═══ ACTIVE FILTER BANNER ═══ */
  .active-filter-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; margin-bottom: 14px;
    background: var(--accent-tint); border: none;
    border-radius: var(--radius-sm); flex-wrap: wrap;
    box-shadow: var(--shadow-sm);
  }
  .active-tag {
    display: inline-flex; align-items: center;
    padding: 3px 8px 3px 10px; background: var(--surface);
    border: 1.5px solid var(--line-2); border-radius: 14px;
    font-size: 11px; font-weight: 600; color: var(--ink);
  }

  /* ═══ SPIN ANIMATION ═══ */
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══ RESPONSIVE ═══ */
  @media (max-width: 640px) {
    .container { padding: 16px 14px; }
    .header h1 { font-size: 24px; }
    .header { gap: 10px; margin-bottom: 20px; }
    .tabs { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab { padding: 8px 14px; font-size: 12px; }
    .card { padding: 18px; border-radius: 12px; }
    .task-card { padding: 14px 16px; }
    .digest-card { padding: 14px 16px; }
    .digest-card .count { font-size: 24px; }
    .employee-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .modal { padding: 22px; border-radius: 14px; }

`;

/* ============================================================
   MAIN APP
   ============================================================ */
function App() {
  const [view, setView] = useState("new"); // 'new' | 'history' | 'personal' | 'tasks'
  const [meetings, setMeetings] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [selectedMeeting, setSelectedMeeting] = useState(null);
  const [selectedEmployee, setSelectedEmployee] = useState(null);
  const [confirmDialog, setConfirmDialog] = useState(null); // { message, onConfirm, danger, confirmLabel }
  const [team, setTeam] = useState([]);
  const [showTeamModal, setShowTeamModal] = useState(false);
  const [tgConfig, setTgConfig] = useState(null);
  const [showTgModal, setShowTgModal] = useState(false);
  const [showImportModal, setShowImportModal] = useState(false);
  const [importText, setImportText] = useState("");

  // load on mount
  useEffect(() => {
    (async () => {
      // Шаг 0: синхронизация с облаком (если не артефакт)
      if (!_artifactStorage) {
        await syncFromCloud();
      }
      // Шаг 1: загрузка данных из storage (localStorage уже синхронизирован с облаком)
      const [m, t, teamData] = await Promise.all([
        storage.getAll("meeting:"),
        storage.getAll("task:"),
        storage.getAll("team:")
      ]);
      setMeetings(m.sort((a, b) => b.date - a.date));
      setTasks(t.sort((a, b) => b.createdAt - a.createdAt));

      // Seed team on first run
      let teamList = teamData;
      if (teamList.length === 0) {
        teamList = SEED_TEAM.map(s => ({ ...s, id: uid() }));
        for (const m of teamList) await storage.set(`team:${m.id}`, m);
      }
      // Миграция: удаляем Жеваник из команды
      const toRemove = teamList.filter(m => m.fullName.toLowerCase().includes("жеваник"));
      for (const m of toRemove) await storage.remove(`team:${m.id}`);
      if (toRemove.length) teamList = teamList.filter(m => !m.fullName.toLowerCase().includes("жеваник"));

      // Миграция: добавляем новых сотрудников из SEED + обновляем sortOrder
      for (const seed of SEED_TEAM) {
        const existing = teamList.find(m => m.fullName === seed.fullName);
        if (!existing) {
          const member = { ...seed, id: uid() };
          await storage.set(`team:${member.id}`, member);
          teamList.push(member);
        } else if (existing.sortOrder !== seed.sortOrder) {
          existing.sortOrder = seed.sortOrder;
          await storage.set(`team:${existing.id}`, existing);
        }
      }
      setTeam(teamList.sort((a, b) => (a.sortOrder ?? 99) - (b.sortOrder ?? 99)));

      // Load Telegram config — на первый запуск или после миграции со старого формата заполняем дефолтным
      let cfg = await loadTgConfig();
      if (!cfg?.webhookUrl) {
        cfg = SEED_TG_CONFIG;
        await saveTgConfig(cfg);
      }
      setTgConfig(cfg);

      setLoading(false);
    })();
  }, []);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  };

  const askConfirm = (message, onConfirm, { danger = true, confirmLabel } = {}) => {
    setConfirmDialog({ message, onConfirm, danger, confirmLabel });
  };

  const saveMeeting = async (meeting, newTasks) => {
    await storage.set(`meeting:${meeting.id}`, meeting);
    for (const t of newTasks) {
      await storage.set(`task:${t.id}`, t);
    }
    setMeetings(prev => [meeting, ...prev.filter(p => p.id !== meeting.id)].sort((a,b) => b.date - a.date));
    setTasks(prev => [...newTasks, ...prev.filter(p => !newTasks.find(n => n.id === p.id))].sort((a,b) => b.createdAt - a.createdAt));
    showToast("Сохранено в историю");
  };

  const deleteMeeting = (id) => {
    askConfirm("Удалить собрание? Связанные задачи останутся.", async () => {
      await storage.remove(`meeting:${id}`);
      setMeetings(prev => prev.filter(m => m.id !== id));
      setSelectedMeeting(null);
      showToast("Собрание удалено");
    });
  };

  const renameMeeting = async (id, newTitle) => {
    const trimmed = (newTitle || "").trim();
    if (!trimmed) return;
    const meeting = meetings.find(m => m.id === id);
    if (!meeting || meeting.title === trimmed) return;
    const updated = { ...meeting, title: trimmed };
    await storage.set(`meeting:${id}`, updated);
    setMeetings(prev => prev.map(m => m.id === id ? updated : m));
    setSelectedMeeting(prev => prev && prev.id === id ? updated : prev);
    showToast("Название обновлено");
  };

  const updateTask = async (task) => {
    await storage.set(`task:${task.id}`, task);
    setTasks(prev => prev.map(t => t.id === task.id ? task : t));
  };

  const deleteTask = (id) => {
    askConfirm("Удалить задачу?", async () => {
      await storage.remove(`task:${id}`);
      setTasks(prev => prev.filter(t => t.id !== id));
      showToast("Задача удалена");
    });
  };

  const addTask = async (task) => {
    await storage.set(`task:${task.id}`, task);
    setTasks(prev => [task, ...prev]);
  };

  const saveTeamMember = async (member) => {
    const m = { ...member, id: member.id || uid() };
    await storage.set(`team:${m.id}`, m);
    setTeam(prev => {
      const without = prev.filter(p => p.id !== m.id);
      return [...without, m].sort((a, b) => (a.sortOrder ?? 99) - (b.sortOrder ?? 99));
    });
    showToast(member.id ? "Сотрудник обновлён" : "Сотрудник добавлен");
  };

  const deleteTeamMember = (id) => {
    askConfirm("Удалить сотрудника из справочника команды?", async () => {
      await storage.remove(`team:${id}`);
      setTeam(prev => prev.filter(p => p.id !== id));
      showToast("Удалено");
    });
  };

  const handleSaveTgConfig = async (cfg) => {
    await saveTgConfig(cfg);
    setTgConfig(cfg);
    showToast("Настройки Telegram сохранены");
  };

  // Распределение собраний по типу
  const groupMeetings = useMemo(() => meetings.filter(m => m.type !== "personal"), [meetings]);
  const personalMeetings = useMemo(() => meetings.filter(m => m.type === "personal"), [meetings]);
  const existingEmployees = useMemo(() => {
    const set = new Set();
    personalMeetings.forEach(m => { if (m.employee) set.add(m.employee); });
    return [...set].sort((a, b) => {
      const oa = team.find(m => m.fullName === a)?.sortOrder ?? 99;
      const ob = team.find(m => m.fullName === b)?.sortOrder ?? 99;
      return oa - ob;
    });
  }, [personalMeetings, team]);

  return (
    <>
      <style>{STYLES}</style>
      <div className="app">
        <div className="container">
          <header className="header">
            <div>
              <h1>Повестка</h1>
              <div className="sub">Транскрипции · Решения · Задачи</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap' }}>
              <div className="small">
                Собраний: <strong>{groupMeetings.length}</strong> · 1-на-1: <strong>{personalMeetings.length}</strong> · Задач: <strong>{tasks.length}</strong>
              </div>
              <button className="btn btn-sm" onClick={() => setShowTeamModal(true)} title="Справочник команды">
                <Users size={13}/> Команда · {team.length}
              </button>
              <button className="btn btn-sm" onClick={() => setShowImportModal(true)} title="Вставить данные из артефакта Claude">
                <Upload size={13}/> Импорт
              </button>
              <button className="btn btn-sm" onClick={async () => {
                const allData = {};
                for (let i = 0; i < localStorage.length; i++) {
                  const k = localStorage.key(i);
                  if (isAppKey(k)) allData[k] = localStorage.getItem(k);
                }
                const blob = new Blob([JSON.stringify(allData)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'povestka-backup-' + new Date().toISOString().slice(0,10) + '.json';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('📦 Экспортировано ' + Object.keys(allData).length + ' записей');
              }} title="Скачать все данные как файл">
                <Download size={13}/> Экспорт
              </button>
              {!_artifactStorage && (
                <button className={`btn btn-sm ${tgConfig?.chats?.length ? "btn-tg-connected" : ""}`} onClick={() => setShowTgModal(true)} title="Настройки Telegram">
                  <Send size={13}/> Telegram{tgConfig?.chats?.length ? ` · ${tgConfig.chats.length}` : " ⚙"}
                </button>
              )}
            </div>
          </header>

          <div className="tabs">
            <button className={`tab ${view==='new'?'active':''}`} onClick={() => { setView('new'); setSelectedMeeting(null); }}>
              <Sparkles size={15}/> Новое собрание
            </button>
            <button className={`tab ${view==='history'?'active':''}`} onClick={() => { setView('history'); setSelectedMeeting(null); }}>
              <FileText size={15}/> История
            </button>
            <button className={`tab ${view==='personal'?'active':''}`} onClick={() => { setView('personal'); setSelectedMeeting(null); setSelectedEmployee(null); }}>
              <Users size={15}/> Личные встречи
            </button>
            <button className={`tab ${view==='tasks'?'active':''}`} onClick={() => { setView('tasks'); setSelectedMeeting(null); }}>
              <CheckSquare size={15}/> Задачи
            </button>
          </div>

          {loading ? (
            <div className="empty"><Loader2 className="spin" size={28} /></div>
          ) : selectedMeeting ? (
            <MeetingDetail
              meeting={selectedMeeting}
              tasks={tasks.filter(t => t.meetingId === selectedMeeting.id)}
              team={team}
              tgConfig={tgConfig}
              onBack={() => setSelectedMeeting(null)}
              onDelete={() => deleteMeeting(selectedMeeting.id)}
              onCopy={() => { copyToClipboard(selectedMeeting.agenda, showToast); }}
              onRename={(t) => renameMeeting(selectedMeeting.id, t)}
              onUpdateTask={updateTask}
              onDeleteTask={deleteTask}
              showToast={showToast}
            />
          ) : view === 'new' ? (
            <NewMeetingView onSave={saveMeeting} showToast={showToast} existingEmployees={existingEmployees} team={team} allTasks={tasks} onUpdateTask={updateTask} />
          ) : view === 'history' ? (
            <HistoryView meetings={groupMeetings} onSelect={setSelectedMeeting} onRename={renameMeeting} />
          ) : view === 'personal' ? (
            <PersonalView
              personalMeetings={personalMeetings}
              tasks={tasks}
              team={team}
              showToast={showToast}
              selectedEmployee={selectedEmployee}
              setSelectedEmployee={setSelectedEmployee}
              onSelectMeeting={setSelectedMeeting}
              onUpdateTask={updateTask}
              onDeleteTask={deleteTask}
            />
          ) : (
            <TasksView tasks={tasks} meetings={meetings} team={team} tgConfig={tgConfig} onUpdate={updateTask} onDelete={deleteTask} onAdd={addTask} onSelectMeeting={setSelectedMeeting} showToast={showToast} />
          )}
        </div>

        {toast && <div className="toast">{toast}</div>}
        {confirmDialog && (
          <ConfirmDialog
            message={confirmDialog.message}
            danger={confirmDialog.danger}
            confirmLabel={confirmDialog.confirmLabel}
            onConfirm={async () => {
              const fn = confirmDialog.onConfirm;
              setConfirmDialog(null);
              if (fn) await fn();
            }}
            onCancel={() => setConfirmDialog(null)}
          />
        )}
        {showTeamModal && (
          <TeamModal
            team={team}
            onClose={() => setShowTeamModal(false)}
            onSave={saveTeamMember}
            onDelete={deleteTeamMember}
          />
        )}
        {showImportModal && (
          <div className="modal-backdrop" onClick={() => { setShowImportModal(false); setImportText(""); }}>
            <div className="modal" style={{ maxWidth: 560 }} onClick={e => e.stopPropagation()}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                <div className="display" style={{ fontSize: 20 }}>📦 Импорт данных</div>
                <button className="btn btn-ghost btn-sm" onClick={() => { setShowImportModal(false); setImportText(""); }}><X size={16}/></button>
              </div>
              <div className="small" style={{ marginBottom: 10 }}>
                В артефакте Claude нажмите <strong>«📋 Экспорт данных»</strong> → в открывшемся окне нажмите <strong>«Скопировать данные»</strong>.<br/>
                Затем вернитесь сюда и вставьте в поле ниже (<strong>Ctrl+V</strong> или <strong>Cmd+V</strong>).
              </div>
              <textarea
                placeholder="Вставьте сюда скопированные данные (Ctrl+V / Cmd+V)..."
                value={importText}
                onChange={e => setImportText(e.target.value)}
                rows={8}
                autoFocus
                style={{ fontFamily: 'monospace', fontSize: 11 }}
              />
              {importText.trim() && (() => {
                try { const d = JSON.parse(importText); return <div className="small" style={{ marginTop: 6, color: 'var(--accent)' }}>✓ Найдено {Object.keys(d).length} записей</div>; }
                catch { return <div className="small" style={{ marginTop: 6, color: 'var(--warn)' }}>✗ Неверный формат — убедитесь что скопировали данные кнопкой «Скопировать данные»</div>; }
              })()}
              <div className="actions-row" style={{ marginTop: 12, justifyContent: 'flex-end' }}>
                <button className="btn" onClick={() => { setShowImportModal(false); setImportText(""); }}>Отмена</button>
                <button className="btn btn-primary" disabled={!importText.trim()} onClick={async () => {
                  try {
                    const data = JSON.parse(importText);
                    let count = 0;
                    for (const [key, value] of Object.entries(data)) {
                      localStorage.setItem(key, value);
                      cloud.upsert(key, value).catch(() => {});
                      count++;
                    }
                    setShowImportModal(false); setImportText("");
                    showToast('📦 Импортировано ' + count + ' записей. Перезагружаю…');
                    setTimeout(() => window.location.reload(), 1500);
                  } catch (e) { showToast('Ошибка: ' + e.message); }
                }}><Upload size={13}/> Загрузить данные</button>
              </div>
            </div>
          </div>
        )}
        {showTgModal && !_artifactStorage && (
          <TelegramModal
            config={tgConfig}
            onSave={handleSaveTgConfig}
            onClose={() => setShowTgModal(false)}
          />
        )}
      </div>
    </>
  );
}

/* ============================================================
   CONFIRM DIALOG
   ============================================================ */
function ConfirmDialog({ message, danger, confirmLabel, onConfirm, onCancel }) {
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onCancel();
      if (e.key === "Enter") onConfirm();
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [onConfirm, onCancel]);

  return (
    <div className="modal-backdrop" onClick={onCancel}>
      <div className="modal" style={{ maxWidth: 420 }} onClick={e => e.stopPropagation()}>
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }}>
          <div style={{ flexShrink: 0, padding: 8, borderRadius: '50%', background: danger ? 'var(--warn-tint)' : 'var(--accent-tint)' }}>
            <AlertCircle size={20} style={{ color: danger ? 'var(--warn)' : 'var(--accent)', display: 'block' }} />
          </div>
          <div style={{ fontSize: 15, lineHeight: 1.5, paddingTop: 6 }}>{message}</div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 20 }}>
          <button className="btn" onClick={onCancel} autoFocus>Отмена</button>
          <button className={`btn ${danger ? 'btn-danger' : 'btn-primary'}`} onClick={onConfirm} style={danger ? { background: 'var(--warn)', color: 'white', borderColor: 'var(--warn)' } : {}}>
            {confirmLabel || (danger ? 'Удалить' : 'OK')}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   NEW MEETING VIEW — paste, generate, review, save
   ============================================================ */
function NewMeetingView({ onSave, showToast, existingEmployees = [], team = [], allTasks = [], onUpdateTask }) {
  const [meetingType, setMeetingType] = useState("group"); // 'group' | 'personal'
  const [employee, setEmployee] = useState("");
  const [transcription, setTranscription] = useState("");
  const [generating, setGenerating] = useState(false);
  const [error, setError] = useState(null);
  const [draft, setDraft] = useState(null); // { title, agenda, tasks, type, employee }
  const [editingAgenda, setEditingAgenda] = useState(false);
  const [fileName, setFileName] = useState(null);
  const [reading, setReading] = useState(false);
  const [dragCount, setDragCount] = useState(0);
  const fileInputRef = useRef(null);
  const agendaRef = useRef(null);
  const dragging = dragCount > 0;
  const [showLinkForm, setShowLinkForm] = useState(false);
  const [linkText, setLinkText] = useState("");
  const [linkUrl, setLinkUrl] = useState("");
  const [linkTaskId, setLinkTaskId] = useState("");

  const handleFile = async (file) => {
    if (!file) return;
    setReading(true);
    setError(null);
    try {
      const name = file.name.toLowerCase();
      let text = "";
      if (name.endsWith(".docx")) {
        const buffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: buffer });
        text = result.value || "";
      } else if (name.endsWith(".txt") || name.endsWith(".md") || name.endsWith(".srt") || name.endsWith(".vtt") || file.type.startsWith("text/")) {
        text = await file.text();
      } else if (name.endsWith(".doc")) {
        throw new Error("Старый формат .doc не поддерживается. Сохраните файл как .docx или .txt.");
      } else {
        // Пытаемся прочитать как текст
        text = await file.text();
      }
      if (!text.trim()) throw new Error("Файл пустой или не удалось извлечь текст.");
      setTranscription(text);
      setFileName(file.name);
      showToast(`Файл загружен: ${file.name}`);
    } catch (e) {
      setError(`Не удалось прочитать файл: ${e.message || e}`);
      setFileName(null);
    } finally {
      setReading(false);
    }
  };

  const onFileInputChange = (e) => {
    const f = e.target.files?.[0];
    if (f) handleFile(f);
    e.target.value = ""; // reset, чтобы можно было загрузить тот же файл снова
  };

  const onDragEnter = (e) => {
    e.preventDefault();
    if (e.dataTransfer?.types?.includes("Files")) setDragCount(c => c + 1);
  };
  const onDragLeave = (e) => {
    e.preventDefault();
    setDragCount(c => Math.max(0, c - 1));
  };
  const onDragOver = (e) => { e.preventDefault(); };
  const onDrop = (e) => {
    e.preventDefault();
    setDragCount(0);
    const f = e.dataTransfer.files?.[0];
    if (f) handleFile(f);
  };

  const clearFile = () => {
    setFileName(null);
    setTranscription("");
  };

  const generate = async () => {
    if (!transcription.trim()) return;
    if (meetingType === "personal" && !employee.trim()) {
      setError("Укажите имя сотрудника для личной встречи.");
      return;
    }
    // Сайт не может вызывать Anthropic API напрямую (CORS + нет API ключа).
    // Генерация работает ТОЛЬКО в артефакте Claude.
    if (!_artifactStorage) {
      setError("Генерация повесток из транскрипции работает только в артефакте Claude (там Anthropic разрешает вызовы ИИ).\n\nНа сайте: создавайте повестки в артефакте → нажимайте «Экспорт данных» → возвращайтесь сюда → «Импорт». Все собрания и задачи синхронизируются.\n\nСайт нужен чтобы: смотреть историю, управлять задачами, отправлять напоминания через бот, синхронизировать данные между устройствами.");
      return;
    }
    setGenerating(true);
    setError(null);
    try {
      // Передаём открытые задачи — ИИ сопоставит с обсуждением в транскрипции
      const openTasks = allTasks.filter(t => {
        if (t.assignees.length === 0) return true;
        return t.assignees.some(a => a.status !== "done");
      });
      const result = await generateFromTranscription(transcription, {
        type: meetingType,
        employee: meetingType === "personal" ? employee.trim() : null,
        team,
        existingTasks: openTasks
      });
      setDraft({
        title: result.title || (meetingType === "personal" ? `1-на-1: ${employee}` : "Собрание"),
        agenda: result.agenda || "",
        type: meetingType,
        employee: meetingType === "personal" ? employee.trim() : null,
        tasks: (result.tasks || []).map(t => ({
          id: uid(),
          title: t.title || "",
          description: t.description || "",
          assignees: (t.assignees || []).map(name => ({ name, status: "pending" })),
          createdAt: Date.now()
        })),
        // Обновления существующих задач
        taskUpdates: (result.task_updates || []).map(u => {
          const existing = allTasks.find(t => t.id === u.existingId);
          return {
            ...u,
            existingTask: existing || null,
            accepted: true // по умолчанию принимаем
          };
        }).filter(u => u.existingTask) // убираем если задача не найдена
      });
    } catch (e) {
      setError(e.message || "Не удалось сгенерировать. Попробуйте ещё раз.");
    } finally {
      setGenerating(false);
    }
  };

  const insertLink = () => {
    const text = linkText.trim();
    const url = normalizeUrl(linkUrl);
    if (!text || !url) return;
    const md = `[${text}](${url})`;
    const ta = agendaRef.current;

    // 1. Вставляем в текст повестки
    if (ta) {
      const start = ta.selectionStart || 0;
      const end = ta.selectionEnd || 0;
      const val = draft.agenda;
      const newVal = val.substring(0, start) + md + val.substring(end);
      // 2. Если выбрана задача — прикрепляем ссылку к ней тоже
      if (linkTaskId) {
        setDraft(d => ({
          ...d,
          agenda: newVal,
          tasks: d.tasks.map(t => t.id === linkTaskId ? { ...t, link: url } : t)
        }));
      } else {
        setDraft(d => ({ ...d, agenda: newVal }));
      }
      setTimeout(() => { ta.selectionStart = ta.selectionEnd = start + md.length; ta.focus(); }, 0);
    } else {
      if (linkTaskId) {
        setDraft(d => ({
          ...d,
          agenda: d.agenda + "\n" + md,
          tasks: d.tasks.map(t => t.id === linkTaskId ? { ...t, link: url } : t)
        }));
      } else {
        setDraft(d => ({ ...d, agenda: d.agenda + "\n" + md }));
      }
    }
    setShowLinkForm(false);
    setLinkText("");
    setLinkUrl("");
    setLinkTaskId("");
  };

  const save = async () => {
    const meetingId = uid();
    const meeting = {
      id: meetingId,
      date: Date.now(),
      title: draft.title,
      transcription,
      agenda: draft.agenda,
      type: draft.type || "group",
      employee: draft.employee || null
    };
    const meetingTasks = draft.tasks.map(t => {
      const linksArr = t.link ? [t.link] : (Array.isArray(t.links) ? t.links : []);
      const { link, ...rest } = t;
      return { ...rest, links: linksArr, meetingId, meetingType: meeting.type, employee: meeting.employee };
    });

    // Применяем принятые обновления к существующим задачам
    if (draft.taskUpdates && onUpdateTask) {
      for (const u of draft.taskUpdates) {
        if (!u.accepted || !u.existingTask) continue;
        const existing = u.existingTask;
        const updated = { ...existing };
        if (u.description) updated.description = (updated.description ? updated.description + "\n\n" : "") + `[${formatDate(Date.now())}] ${u.description}`;
        if (u.newDueDate) {
          const parsed = fromInputDate(u.newDueDate) || null;
          if (parsed) {
            if (updated.dueDate && parsed > updated.dueDate) {
              updated.postponedCount = (updated.postponedCount || 0) + 1;
              updated.originalDueDate = updated.originalDueDate || updated.dueDate;
            }
            updated.dueDate = parsed;
          }
        }
        await onUpdateTask(updated);
      }
    }

    onSave(meeting, meetingTasks);
    setTranscription("");
    setFileName(null);
    setDraft(null);
    if (meetingType === "personal") setEmployee("");
  };

  const updateDraftTask = (taskId, patch) => {
    setDraft(d => ({ ...d, tasks: d.tasks.map(t => t.id === taskId ? { ...t, ...patch } : t) }));
  };

  const removeDraftTask = (taskId) => {
    setDraft(d => ({ ...d, tasks: d.tasks.filter(t => t.id !== taskId) }));
  };

  const addDraftTask = () => {
    setDraft(d => ({ ...d, tasks: [...d.tasks, {
      id: uid(), title: "", description: "", assignees: [], createdAt: Date.now()
    }]}));
  };

  if (!draft) {
    const charCount = transcription.length;
    return (
      <div
        className={`card drop-zone ${dragging ? 'dragging' : ''}`}
        onDragEnter={onDragEnter}
        onDragLeave={onDragLeave}
        onDragOver={onDragOver}
        onDrop={onDrop}
      >
        {dragging && (
          <div className="drop-overlay">
            <Upload size={36}/>
            <div style={{ fontFamily: 'Fraunces, serif', fontSize: 22 }}>Отпустите файл</div>
            <div style={{ fontSize: 13, color: 'var(--ink-2)', fontWeight: 400 }}>.txt или .docx</div>
          </div>
        )}

        {/* Информационный баннер для сайта */}
        {!_artifactStorage && (
          <div style={{
            padding: '14px 18px', marginBottom: 20,
            background: 'var(--accent-tint)', border: '1.5px solid var(--accent)',
            borderRadius: 'var(--radius-sm)', fontSize: 13, lineHeight: 1.6
          }}>
            <div style={{ fontWeight: 700, marginBottom: 4, color: 'var(--accent-2)' }}>
              ℹ️ Генерация повесток только в артефакте Claude
            </div>
            <div style={{ color: 'var(--ink-2)' }}>
              Сайт не может вызывать ИИ напрямую (ограничения CORS). Создавайте повестки в <strong>артефакте Claude</strong> → жмите <strong>«📋 Экспорт данных»</strong> → возвращайтесь сюда → <strong>«⬆ Импорт»</strong>. Здесь управляйте задачами, историей, отправкой в Telegram.
            </div>
          </div>
        )}

        {/* Тип собрания */}
        <div className="type-toggle">
          <button
            className={`type-btn ${meetingType === 'group' ? 'active' : ''}`}
            onClick={() => setMeetingType('group')}
          >
            <Users size={15}/> Групповое собрание
            <div className="type-sub">Повестка для чата руководителей</div>
          </button>
          <button
            className={`type-btn ${meetingType === 'personal' ? 'active' : ''}`}
            onClick={() => setMeetingType('personal')}
          >
            <Sparkles size={15}/> Личная встреча (1-на-1)
            <div className="type-sub">Конфиденциальные заметки</div>
          </button>
        </div>

        {meetingType === 'personal' && (
          <div style={{ marginBottom: 16 }}>
            <label>С кем встреча?</label>
            <input
              list="employees-datalist"
              placeholder="Имя и фамилия сотрудника"
              value={employee}
              onChange={e => setEmployee(e.target.value)}
              autoFocus
            />
            <datalist id="employees-datalist">
              {existingEmployees.map(name => <option key={name} value={name} />)}
            </datalist>
            {existingEmployees.length > 0 && (
              <div style={{ marginTop: 8, display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                {existingEmployees.slice(0, 8).map(name => (
                  <button
                    key={name}
                    className="filter-btn"
                    onClick={() => setEmployee(name)}
                    style={{ fontSize: 12 }}
                  >
                    {name}
                  </button>
                ))}
              </div>
            )}
          </div>
        )}

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10, flexWrap: 'wrap', gap: 8 }}>
          <label style={{ margin: 0 }}>{meetingType === 'personal' ? 'Транскрипция личной встречи' : 'Транскрипция собрания'}</label>
          <div className="actions-row">
            <input
              ref={fileInputRef}
              type="file"
              accept=".txt,.docx,.md,.srt,.vtt,text/plain"
              style={{ display: 'none' }}
              onChange={onFileInputChange}
            />
            <button className="btn btn-sm" onClick={() => fileInputRef.current?.click()} disabled={reading || generating}>
              {reading ? <><Loader2 size={14} className="spin"/> Читаю…</> : <><Paperclip size={14}/> Загрузить файл</>}
            </button>
          </div>
        </div>

        {fileName && (
          <div className="file-chip">
            <FileText size={14}/>
            <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{fileName}</span>
            <span className="small" style={{ flexShrink: 0 }}>{(charCount/1000).toFixed(0)}K символов</span>
            <X size={14} style={{ cursor: 'pointer', flexShrink: 0 }} onClick={clearFile} title="Очистить" />
          </div>
        )}

        <textarea
          placeholder="Вставьте транскрипцию сюда или перетащите файл (.txt, .docx) в эту область…"
          value={transcription}
          onChange={e => { setTranscription(e.target.value); if (fileName) setFileName(null); }}
          rows={14}
        />
        <div className="hint">
          Поддерживаются: .txt, .docx, .md, .srt, .vtt. Длина не ограничена.
          {charCount > 0 && !fileName && ` · ${(charCount/1000).toFixed(1)}K символов`}
        </div>
        {error && <div style={{ marginTop: 12, color: 'var(--warn)', fontSize: 13, display: 'flex', alignItems: 'center', gap: 6 }}>
          <AlertCircle size={14}/> {error}
        </div>}
        <div style={{ marginTop: 16, display: 'flex', justifyContent: 'flex-end' }}>
          <button className="btn btn-primary" onClick={generate} disabled={!transcription.trim() || generating || reading}>
            {generating ? <><Loader2 size={15} className="spin"/> Анализирую…</> : <><Wand2 size={15}/> Сгенерировать повестку</>}
          </button>
        </div>
        <style>{`.spin { animation: rot 1s linear infinite; } @keyframes rot { to { transform: rotate(360deg); } }`}</style>
      </div>
    );
  }

  return (
    <>
      <div className="card">
        <label>Название</label>
        <input value={draft.title} onChange={e => setDraft(d => ({ ...d, title: e.target.value }))} />

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 20, marginBottom: 8 }}>
          <label style={{ margin: 0 }}>Текст повестки</label>
          <button className="btn btn-ghost btn-sm" onClick={() => setEditingAgenda(e => !e)}>
            {editingAgenda ? <><Check size={14}/> Готово</> : <><Edit3 size={14}/> Редактировать</>}
          </button>
        </div>
        {editingAgenda ? (
          <div>
            <textarea ref={agendaRef} value={draft.agenda} onChange={e => setDraft(d => ({ ...d, agenda: e.target.value }))} rows={14} />
            <div style={{ marginTop: 8, display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
              <button className="btn btn-ghost btn-sm" onClick={() => setShowLinkForm(f => !f)}>
                <Link2 size={13}/> Вставить ссылку
              </button>
              <div className="hint" style={{ margin: 0 }}>Формат: [текст](url) — в превью станет кликабельной ссылкой</div>
            </div>
            {showLinkForm && (
              <div style={{ marginTop: 8, padding: 12, background: 'var(--surface-2)', border: '1px solid var(--line)', borderRadius: 8 }}>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'flex-end' }}>
                  <div style={{ flex: 1, minWidth: 140 }}>
                    <label style={{ fontSize: 12 }}>Текст ссылки</label>
                    <input
                      autoFocus
                      placeholder="Файл / Таблица / Отчёт"
                      value={linkText}
                      onChange={e => setLinkText(e.target.value)}
                      style={{ fontSize: 13 }}
                    />
                  </div>
                  <div style={{ flex: 2, minWidth: 200 }}>
                    <label style={{ fontSize: 12 }}>URL</label>
                    <input
                      placeholder="https://docs.google.com/..."
                      value={linkUrl}
                      onChange={e => setLinkUrl(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && insertLink()}
                      style={{ fontSize: 13, fontFamily: 'monospace' }}
                    />
                  </div>
                </div>
                {draft.tasks.length > 0 && (
                  <div style={{ marginTop: 10 }}>
                    <label style={{ fontSize: 12 }}>📌 Прикрепить к задаче (одно действие — ссылка попадёт и в текст, и в задачу)</label>
                    <select
                      value={linkTaskId}
                      onChange={e => setLinkTaskId(e.target.value)}
                      style={{ width: '100%', padding: '8px 10px', fontSize: 13, fontFamily: 'inherit', background: 'var(--surface)', border: '1px solid var(--line)', borderRadius: 8, color: 'var(--ink)' }}
                    >
                      <option value="">— Только в текст повестки —</option>
                      {draft.tasks.map(t => (
                        <option key={t.id} value={t.id}>
                          {t.title}{t.link ? ' ✓ (уже есть ссылка)' : ''}
                        </option>
                      ))}
                    </select>
                  </div>
                )}
                <div style={{ display: 'flex', gap: 4, marginTop: 10, justifyContent: 'flex-end' }}>
                  <button className="btn btn-ghost btn-sm" onClick={() => { setShowLinkForm(false); setLinkTaskId(""); }}>
                    <X size={12}/> Отмена
                  </button>
                  <button className="btn btn-sm btn-primary" onClick={insertLink} disabled={!linkText.trim() || !linkUrl.trim()}>
                    <Check size={12}/> Вставить{linkTaskId ? ' + прикрепить' : ''}
                  </button>
                </div>
              </div>
            )}
          </div>
        ) : (
          <div className="agenda-output">{renderMarkdown(draft.agenda)}</div>
        )}
        <div style={{ marginTop: 12, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <button className="btn btn-sm" onClick={() => { copyToClipboard(draft.agenda, showToast); }}>
            <Copy size={14}/> Скопировать текст
          </button>
          <TgSendButton text={draft.agenda} showToast={showToast} tgConfig={tgConfig} />
        </div>
      </div>

      {/* Обновления существующих задач */}
      {draft.taskUpdates && draft.taskUpdates.length > 0 && (
        <div className="card" style={{ borderColor: '#c8a957', borderWidth: 1.5 }}>
          <div className="display" style={{ fontSize: 20, marginBottom: 4 }}>🔄 Обновления существующих задач</div>
          <div className="small" style={{ marginBottom: 16 }}>ИИ нашёл в транскрипции обсуждение задач, которые уже есть в вашем трекере. Примите или отклоните каждое обновление.</div>
          {draft.taskUpdates.map((u, idx) => (
            <div key={u.existingId || idx} style={{
              padding: 14, marginBottom: 10, borderRadius: 10,
              background: u.accepted ? '#fdf8e8' : 'var(--surface-2)',
              border: `1px solid ${u.accepted ? '#d9c98a' : 'var(--line)'}`,
              opacity: u.accepted ? 1 : 0.6,
              transition: 'all 0.15s'
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, flexWrap: 'wrap' }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 15 }}>📌 {u.existingTask?.title || u.existingId}</div>
                  {u.reason && <div style={{ marginTop: 6, fontSize: 13, color: 'var(--ink-2)' }}>💬 {u.reason}</div>}
                  {u.description && <div style={{ marginTop: 6, fontSize: 13, padding: '8px 10px', background: 'var(--surface)', borderRadius: 6, border: '1px solid var(--line)' }}>
                    <span className="small" style={{ fontWeight: 600 }}>Дополнение:</span> {u.description}
                  </div>}
                  {u.newDueDate && <div style={{ marginTop: 6, fontSize: 13 }}>📅 Новый срок: <strong>{u.newDueDate}</strong></div>}
                </div>
                <button
                  className={`btn btn-sm ${u.accepted ? 'btn-primary' : ''}`}
                  onClick={() => {
                    setDraft(d => ({
                      ...d,
                      taskUpdates: d.taskUpdates.map((tu, i) => i === idx ? { ...tu, accepted: !tu.accepted } : tu)
                    }));
                  }}
                >
                  {u.accepted ? <><Check size={13}/> Принято</> : "Отклонено"}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="card">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <div className="display" style={{ fontSize: 20 }}>➕ Новые задачи</div>
          <button className="btn btn-sm" onClick={addDraftTask}><Plus size={14}/> Добавить</button>
        </div>
        {draft.tasks.length === 0 ? (
          <div className="small">Задачи не найдены. Можете добавить вручную.</div>
        ) : (
          draft.tasks.map(t => (
            <TaskEditor key={t.id} task={t} onUpdate={p => updateDraftTask(t.id, p)} onRemove={() => removeDraftTask(t.id)} />
          ))
        )}
      </div>

      <div className="actions-row" style={{ marginTop: 20, justifyContent: 'flex-end' }}>
        <button className="btn" onClick={() => setDraft(null)}>
          <ArrowLeft size={14}/> Отмена
        </button>
        <button className="btn btn-primary" onClick={save}>
          <Save size={14}/> Сохранить в историю
        </button>
      </div>
    </>
  );
}

/* ============================================================
   TASK EDITOR — for editing tasks in draft mode
   ============================================================ */
function TaskEditor({ task, onUpdate, onRemove }) {
  const [newAssignee, setNewAssignee] = useState("");

  const addAssignee = () => {
    const name = newAssignee.trim();
    if (!name) return;
    if (task.assignees.find(a => a.name.toLowerCase() === name.toLowerCase())) return;
    onUpdate({ assignees: [...task.assignees, { name, status: "pending" }] });
    setNewAssignee("");
  };

  return (
    <div style={{ border: '1px solid var(--line)', borderRadius: 10, padding: 14, marginBottom: 10, background: 'var(--surface-2)' }}>
      <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
        <input
          placeholder="Что нужно сделать"
          value={task.title}
          onChange={e => onUpdate({ title: e.target.value })}
          style={{ flex: 1, background: 'var(--surface)' }}
        />
        <button className="btn btn-ghost btn-sm btn-danger" onClick={onRemove}><Trash2 size={14}/></button>
      </div>
      <input
        placeholder="Детали (опционально)"
        value={task.description}
        onChange={e => onUpdate({ description: e.target.value })}
        style={{ marginTop: 8, background: 'var(--surface)' }}
      />
      <div style={{ marginTop: 8, display: 'flex', gap: 6, alignItems: 'center' }}>
        <Link2 size={14} style={{ color: 'var(--ink-3)', flexShrink: 0 }}/>
        <input
          placeholder="Ссылка на Google Sheets / документ (опционально)"
          value={task.link || ""}
          onChange={e => onUpdate({ link: e.target.value })}
          onBlur={e => {
            const v = e.target.value.trim();
            if (v) {
              const norm = normalizeUrl(v);
              if (norm && norm !== v) onUpdate({ link: norm });
            }
          }}
          style={{ flex: 1, background: 'var(--surface)', fontSize: 13 }}
        />
        {task.link && (
          <a href={normalizeUrl(task.link) || "#"} target="_blank" rel="noopener noreferrer" className="btn btn-ghost btn-sm" title="Открыть в новой вкладке">
            <ExternalLink size={13}/>
          </a>
        )}
      </div>
      <div style={{ marginTop: 12, display: 'flex', flexWrap: 'wrap', gap: 6, alignItems: 'center' }}>
        {task.assignees.map((a, i) => (
          <span key={i} className="assignee-chip" style={{ cursor: 'default' }}>
            <span className="name">{a.name}</span>
            <X size={12} style={{ cursor: 'pointer' }} onClick={() => onUpdate({ assignees: task.assignees.filter((_, j) => j !== i) })} />
          </span>
        ))}
        <div style={{ display: 'flex', gap: 4 }}>
          <input
            placeholder="+ исполнитель"
            value={newAssignee}
            onChange={e => setNewAssignee(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addAssignee()}
            style={{ width: 140, padding: '6px 10px', fontSize: 13, background: 'var(--surface)' }}
          />
        </div>
      </div>
    </div>
  );
}

function HistoryView({ meetings, onSelect, onRename }) {

    return (
      <div className="empty">
        <div className="display">История пуста</div>
        <div>Сохранённые собрания появятся здесь</div>
      </div>
    );
  }
  return (
    <div>
      {meetings.map(m => (
        <MeetingRow key={m.id} meeting={m} onSelect={() => onSelect(m)} onRename={(t) => onRename(m.id, t)} />
      ))}

function MeetingRow({ meeting, onSelect, onRename }) {
  const [editing, setEditing] = useState(false);
  const [value, setValue] = useState(meeting.title);
  const d = new Date(meeting.date);

  const commit = () => {
    const t = value.trim();
    if (t && t !== meeting.title) onRename(t);
    else setValue(meeting.title);
    setEditing(false);
  };
  const cancel = () => { setValue(meeting.title); setEditing(false); };

  return (
    <div className="meeting-row" onClick={() => !editing && onSelect()}>
      <div className="date-block">
        <div className="day">{d.getDate()}</div>
        <div className="mon">{RU_MONTHS[d.getMonth()].slice(0, 3)}</div>
      </div>
      <div className="info">
        {editing ? (
          <input
            autoFocus
            value={value}
            onChange={e => setValue(e.target.value)}
            onClick={e => e.stopPropagation()}
            onBlur={commit}
            onKeyDown={e => {
              e.stopPropagation();
              if (e.key === 'Enter') commit();
              if (e.key === 'Escape') cancel();
            }}
            style={{ padding: '6px 10px', fontSize: 17, fontFamily: 'Fraunces, serif', fontWeight: 500 }}
          />
        ) : (
          <h3>{meeting.title}</h3>
        )}
        <div className="meta">{formatDate(meeting.date)}</div>
      </div>
      <button
        className="btn btn-ghost btn-sm row-edit-btn"
        onClick={e => { e.stopPropagation(); editing ? commit() : setEditing(true); }}
        title={editing ? "Сохранить" : "Переименовать"}
      >
        {editing ? <Check size={15}/> : <Edit3 size={15}/>}
      </button>
      {!editing && <ChevronRight size={20} style={{ color: 'var(--ink-3)' }} />}
    </div>
  );
}
